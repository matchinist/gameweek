function renumberRankItems(list){
  // Numbers reflect whichever slot a row currently sits in — recomputed fresh
  // from DOM order, never carried along with a team as it moves.
  list.querySelectorAll('.rank-item').forEach((el,i)=>{
    el.querySelectorAll('.rank-num').forEach(num=>{ num.textContent=(i+1); });
  });
}

function initDragSort(){
  const list=document.getElementById('ranking-list');
  if(!list)return;
  const roundId=list.dataset.roundid;
  let dragItem=null, itemH=0;
  // The row currently highlighted as the drop target, and whether the
  // dragged item would land before or after it. Nothing actually moves
  // until the user releases — dragging only highlights a candidate slot.
  // dropTarget is "sticky": once set it only changes when another row
  // clearly overlaps more, so release always has something valid to commit.
  let dropTarget=null;
  const OVERLAP_THRESHOLD=0.15; // don't switch target until ~15% covered

  function clearHighlights(){
    list.querySelectorAll('.rank-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  }

  function commitReorder(){
    // A genuine swap of the two rows' positions — whatever is highlighted
    // when the user releases always actually changes places with the
    // dragged row, regardless of exactly where in that row they let go.
    if(dragItem && dropTarget && dropTarget!==dragItem){
      const dragNext=dragItem.nextSibling;
      const dropNext=dropTarget.nextSibling;
      if(dragNext===dropTarget){
        list.insertBefore(dropTarget,dragItem);
      } else if(dropNext===dragItem){
        list.insertBefore(dragItem,dropTarget);
      } else {
        const marker=document.createComment('');
        list.insertBefore(marker,dragItem);
        list.insertBefore(dragItem,dropNext);
        list.insertBefore(dropTarget,marker);
        marker.remove();
      }
    }
    clearHighlights();
    renumberRankItems(list);
    const newOrder=[...list.querySelectorAll('.rank-item')].map(el=>el.dataset.tid);
    preds[roundId+'_ranking']=newOrder;
    predsDirty=true;
    const btn=document.querySelector('.submit-preds-btn');
    if(btn){btn.classList.remove('disabled');}
    dropTarget=null;
  }

  // Picks whichever row has the greatest overlap with a virtual box the same
  // height as the dragged row, centered on the pointer. Only switches to a
  // new target once overlap clears the threshold, and never un-highlights
  // to nothing — the last valid target stays sticky until a better one wins.
  function updateDropTarget(clientY){
    const items=[...list.querySelectorAll('.rank-item')];
    const others=items.filter(it=>it!==dragItem);
    if(!others.length)return;
    const h=itemH||others[0].getBoundingClientRect().height;
    const dragTop=clientY-h/2, dragBottom=clientY+h/2;

    let best=null, bestPct=0;
    others.forEach(it=>{
      const rect=it.getBoundingClientRect();
      const overlapTop=Math.max(dragTop,rect.top);
      const overlapBottom=Math.min(dragBottom,rect.bottom);
      const overlapH=Math.max(0,overlapBottom-overlapTop);
      const pct=rect.height>0?overlapH/rect.height:0;
      if(pct>bestPct){ bestPct=pct; best=it; }
    });

    if(best && bestPct>=OVERLAP_THRESHOLD){
      dropTarget=best;
    }
    // else: below threshold everywhere — keep the previous dropTarget as-is

    clearHighlights();
    if(dropTarget) dropTarget.classList.add('drag-over');
  }

  list.querySelectorAll('.rank-item').forEach(item=>{
    // Touch events — drag can start anywhere on the row, but only activates
    // after a brief hold with minimal movement. A normal scroll swipe moves
    // quickly right away and cancels the pending drag instead of hijacking it.
    let holdTimer=null, touchStartX=0, touchStartY=0, holdCancelled=false;
    const HOLD_MS=160, MOVE_TOLERANCE=10;
    item.addEventListener('touchstart',e=>{
      const touch=e.touches[0];
      touchStartX=touch.clientX; touchStartY=touch.clientY;
      holdCancelled=false;
      clearTimeout(holdTimer);
      holdTimer=setTimeout(()=>{
        if(holdCancelled)return;
        dragItem=item;
        itemH=item.offsetHeight;
        dropTarget=null;
        item.classList.add('dragging');
        item.style.zIndex='100';
      },HOLD_MS);
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      if(dragItem===item)return; // already active — list-level handler takes over
      const touch=e.touches[0];
      const dx=Math.abs(touch.clientX-touchStartX), dy=Math.abs(touch.clientY-touchStartY);
      if(dx>MOVE_TOLERANCE||dy>MOVE_TOLERANCE){
        holdCancelled=true;
        clearTimeout(holdTimer);
      }
    },{passive:true});
    item.addEventListener('touchend',()=>{
      holdCancelled=true;
      clearTimeout(holdTimer);
    },{passive:true});

    // Mouse drag
    item.addEventListener('dragstart',e=>{
      dragItem=item;
      itemH=item.offsetHeight;
      dropTarget=null;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>item.classList.add('dragging'),0);
    });
    item.addEventListener('dragend',()=>{
      if(dragItem){dragItem.classList.remove('dragging');}
      commitReorder();
      dragItem=null;
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragItem)return;
      updateDropTarget(e.clientY);
    });
  });

  // Touch move/end on list — highlight only, no live reordering
  list.addEventListener('touchmove',e=>{
    if(!dragItem)return;
    e.preventDefault();
    updateDropTarget(e.touches[0].clientY);
  },{passive:false});

  list.addEventListener('touchend',()=>{
    if(!dragItem)return;
    dragItem.classList.remove('dragging');
    dragItem.style.zIndex='';
    commitReorder();
    dragItem=null;
  });

  list.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragItem){dragItem.classList.remove('dragging');}
    commitReorder();
    dragItem=null;
  });
}

function initRouletteBoard(){
  rlRemaining=RL_BUDGET; rlStakes={}; rlMeta={};
  const gridEl=document.getElementById('rl-grid');
  const dotsEl=document.getElementById('rl-dots');
  if(!gridEl||!dotsEl)return;
  gridEl.innerHTML=''; dotsEl.innerHTML='';

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const id=rlCellId(r,c);
      const type=rlCellType(RL_HOME[r],RL_AWAY[c]);
      const bg=type==='draw'?'var(--surface)':type==='home'?'var(--accent-light)':'#FFEDD5';
      const div=document.createElement('div');
      div.id=id; div.dataset.h=RL_HOME[r]; div.dataset.a=RL_AWAY[c];
      div.style.cssText=`position:relative;border-radius:12px;border:1px solid var(--border);background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .1s,outline .15s;`;
      div.onclick=()=>rlAddChip(id);
      div.innerHTML=`<span id="rlminus_${id}" onclick="event.stopPropagation();rlRemoveChip('${id}')" style="position:absolute;top:-7px;right:-7px;width:19px;height:19px;border-radius:50%;background:var(--red);color:white;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;z-index:6;">−</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text-3);position:absolute;top:6px;right:7px;">×16</span>
        <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);">${rlScoreLabel(r,c)}</span>
        <span id="rlchip_${id}" style="display:none;margin-top:5px;font-family:var(--mono);font-size:12px;font-weight:700;color:white;background:var(--accent);border-radius:8px;padding:2px 9px;min-width:24px;text-align:center;"></span>`;
      gridEl.appendChild(div);
      rlMeta[id]={label:rlScoreLabel(r,c)+' correct score',mult:16,cells:[id]};
    }
  }

  const boundary=[1,2,3].map(i=>i*RL_PITCH-RL_GAP/2);
  const center=i=>i*RL_PITCH+RL_CELL/2;

  function addDot(id,x,y,cells,label){
    rlMeta[id]={label,mult:Math.round(16/cells.length),cells};
    const div=document.createElement('div');
    div.id=id;
    div.style.cssText=`position:absolute;width:20px;height:20px;border-radius:50%;background:var(--white);border:1.5px solid var(--text-3);z-index:3;display:flex;align-items:center;justify-content:center;cursor:pointer;transform:translate(-50%,-50%);transition:transform .1s,background .15s,border-color .15s;pointer-events:auto;left:${x}px;top:${y}px;`;
    div.onclick=()=>rlAddChip(id);
    div.innerHTML=`<span id="rlminus_${id}" onclick="event.stopPropagation();rlRemoveChip('${id}')" style="position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:var(--red);color:white;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;z-index:6;">−</span>
      <span id="rlchip_${id}" style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text-3);"></span>`;
    dotsEl.appendChild(div);
  }
  for(let r=0;r<4;r++)boundary.forEach((bx,ci)=>addDot('rlhsplit_'+r+'_'+ci,bx,center(r),[rlCellId(r,ci),rlCellId(r,ci+1)],rlScoreLabel(r,ci)+' / '+rlScoreLabel(r,ci+1)));
  for(let c=0;c<4;c++)boundary.forEach((by,ri)=>addDot('rlvsplit_'+ri+'_'+c,center(c),by,[rlCellId(ri,c),rlCellId(ri+1,c)],rlScoreLabel(ri,c)+' / '+rlScoreLabel(ri+1,c)));
  boundary.forEach((by,ri)=>boundary.forEach((bx,ci)=>addDot('rlcorner_'+ri+'_'+ci,bx,by,[rlCellId(ri,ci),rlCellId(ri,ci+1),rlCellId(ri+1,ci),rlCellId(ri+1,ci+1)],'4-way: '+rlScoreLabel(ri,ci)+', '+rlScoreLabel(ri,ci+1)+', '+rlScoreLabel(ri+1,ci)+', '+rlScoreLabel(ri+1,ci+1))));

  rlUpdateFooter();
  rlFitBoard();
}

function rlFitBoard(){
  const outer=document.getElementById('rl-scale-outer');
  const inner=document.getElementById('rl-scale-inner');
  if(!outer||!inner)return;
  inner.style.transform='none';
  const naturalW=inner.offsetWidth;
  const naturalH=inner.offsetHeight;
  const availW=outer.clientWidth;
  const scale=Math.min(1, availW/naturalW);
  inner.style.transform=`scale(${scale})`;
  outer.style.height=(naturalH*scale)+'px';
}
window.addEventListener('resize',()=>{ if(document.getElementById('rl-scale-outer'))rlFitBoard(); });

function rlAddChip(id){
  if(rlRemaining<RL_STEP)return;
  rlStakes[id]=(rlStakes[id]||0)+RL_STEP;
  rlRemaining-=RL_STEP;
  rlRender(id);
}
function rlRemoveChip(id){
  if(!rlStakes[id])return;
  rlStakes[id]-=RL_STEP;
  rlRemaining+=RL_STEP;
  if(rlStakes[id]<=0)delete rlStakes[id];
  rlRender(id);
}
function rlClearAll(){
  Object.keys(rlStakes).forEach(k=>delete rlStakes[k]);
  rlRemaining=RL_BUDGET;
  Object.keys(rlMeta).forEach(rlRender);
}
function rlRender(id){
  const el=document.getElementById(id);
  const chipEl=document.getElementById('rlchip_'+id);
  const minusEl=document.getElementById('rlminus_'+id);
  const val=rlStakes[id]||0;
  if(chipEl){
    chipEl.textContent=val;
    chipEl.style.display=val>0?'inline-block':'none';
    if(id.match(/^rl(hsplit|vsplit|corner)_/)) chipEl.style.color = val>0 ? 'white' : 'var(--text-3)';
  }
  if(minusEl){minusEl.style.display=val>0?'flex':'none';}
  if(el && id.match(/^rl(hsplit|vsplit|corner)_/)){
    if(val>0){ el.style.background='#2563EB'; el.style.borderColor='#1D4ED8'; el.style.transform='translate(-50%,-50%) scale(1.15)'; }
    else { el.style.background='var(--white)'; el.style.borderColor='var(--text-3)'; el.style.transform='translate(-50%,-50%) scale(1)'; }
  }
  rlUpdateFooter();
}
function rlUpdateFooter(){
  const staked=RL_BUDGET-rlRemaining;
  const coinEl=document.getElementById('rl-coin-value');
  if(coinEl){coinEl.textContent=rlRemaining;coinEl.style.color=rlRemaining===0?'#DC2626':'var(--text)';}
  const stakedEl=document.getElementById('rl-staked-count');
  if(stakedEl)stakedEl.textContent=staked;
  const btn=document.getElementById('rl-place-btn');
  if(btn)btn.disabled=staked===0;
  rlRenderBetslip();
}
function rlRenderBetslip(){
  const el=document.getElementById('rl-betslip');
  if(!el)return;
  const ids=Object.keys(rlStakes);
  if(!ids.length){el.innerHTML='';return;}
  const typeLabel = id => id.startsWith('rlhsplit')||id.startsWith('rlvsplit') ? 'SPLIT' : id.startsWith('rlcorner') ? 'CORNER' : 'STRAIGHT';
  el.innerHTML='<div style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Bet Slip</div>'+ids.map(id=>{
    const m=rlMeta[id],stake=rlStakes[id],payout=stake*m.mult;
    const type=typeLabel(id);
    const typeColor=type==='STRAIGHT'?'var(--accent)':type==='SPLIT'?'#7C3AED':'#0891B2';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:6px;background:var(--surface);border-radius:8px;border-left:3px solid ${typeColor};">
      <div>
        <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${typeColor};margin-bottom:2px;">${type} · ×${m.mult}</div>
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);">${m.label}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:1px;">${stake} coins staked</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:10px;color:var(--text-3);">potential win</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:800;color:var(--green);">${payout}</div>
      </div>
    </div>`;
  }).join('');
}
function rlChangeRound(idx){
  selectedRound[currentCompIdx]=parseInt(idx);
  rlRemaining=RL_BUDGET; rlStakes={}; rlMeta={};
  const el=document.getElementById('predict-content');
  if(el){el.innerHTML=renderRouletteHTML();}
  setTimeout(()=>initRouletteBoard(),50);
}
function rlPlaceBets(){toast('✓ Bets placed (demo — not persisted)');}

function submitPreds(){
  const comp=COMPS[currentCompIdx],round=comp?.rounds[selectedRound[currentCompIdx]];
  if(!round)return;
  if(!currentPlayer){
    pendingSaveAction='predictions';
    openAuthModal('Sign in to save your predictions');
    return;
  }
  const events=round.eventIds.map(id=>({id,...EVENTS[id]})).filter(e=>e.home&&!e.res&&!e.locked);
  events.forEach(ev=>{
    const p=preds[ev.id];
    const hasVal = comp.mode==='score' ? (p&&p.h!==undefined&&p.a!==undefined)
      : comp.mode==='betting' ? (p&&typeof p==='object'&&Object.keys(p).length>0)
      : (p!==undefined&&p!==null);
    if(hasVal) savePred(ev.id, p);
  });
  if(comp.mode==='ranking'){
    const rk=round.id+'_ranking';
    if(preds[rk]) savePred(rk, preds[rk]);
  }
  predsDirty=false;
  const btn=document.querySelector('.submit-preds-btn');
  if(btn){btn.classList.add('disabled');btn.textContent='\u2713 Saved';}
  const done=events.filter(ev=>{
    const p=preds[ev.id];
    return comp.mode==='score' ? (p&&p.h!==undefined&&p.a!==undefined)
      : comp.mode==='betting' ? (p&&typeof p==='object'&&Object.keys(p).length>0)
      : (p!==undefined&&p!==null);
  }).length;
  toast('\u2713 '+done+' of '+events.length+' predictions saved');
}

function submitRanking(roundId){
  const comp=COMPS[currentCompIdx],round=comp?.rounds[selectedRound[currentCompIdx]];
  if(!round||round.id!==roundId)return;
  if(!currentPlayer){
    pendingSaveAction='predictions';
    openAuthModal('Sign in to save your ranking');
    return;
  }
  const rk=round.id+'_ranking';
  const order=preds[rk];
  if(!order||!order.length){ toast('Reorder the teams first'); return; }
  savePred(rk, order);
  predsDirty=false;
  const btn=document.querySelector('.submit-preds-btn');
  if(btn){btn.classList.add('disabled');btn.textContent='\u2713 Saved';}
  toast('\u2713 Ranking saved');
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────
function renderPredictionsPane(comp){
  if(comp.mode==='lineup') return renderLineupPredictor(comp);
  const ri=selectedRound[currentCompIdx];
  if(!comp.rounds.length) return '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No rounds yet</div></div>';
  const round=comp.rounds[ri]; if(!round) return '';
  const isOpen=round.status==='open';
  let events=(round.eventIds||[]).map(id=>({id,...EVENTS[id],tournament:(round.tournamentNames||[])[0]||''})).filter(e=>e.home);

  let nextScoreLock=null;
  if(comp.mode==='score'){
    const nowTs=Date.now();
    events.forEach(ev=>{
      const raw=ev.kickoffRaw||ev.kickoff;
      const ko=parseKickoffMs(raw);
      ev._scoreLockAt = ko!=null ? ko-3600000 : null;
    });
    const upcoming=events.filter(ev=>!ev.res&&ev._scoreLockAt!=null&&ev._scoreLockAt>nowTs).sort((a,b)=>a._scoreLockAt-b._scoreLockAt);
    if(upcoming.length) nextScoreLock=upcoming[0];
  }

  let eliminatedAtIdx=-1;
  if(comp.mode==='lms'){
    events.sort((a,b)=>new Date(a.kickoffRaw||0)-new Date(b.kickoffRaw||0));
    if(!isOpen){
      for(let i=0;i<events.length;i++){
        const ev=events[i], p=preds[ev.id];
        if(ev.res&&p){ const actual=ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D'; if(p!==actual){ eliminatedAtIdx=i; break; } }
      }
    }
  }

  // ALL MODES: open immediately, lock 1 hour before the first event's kick-off
  let lockedByTime=false, timeLockAt=null;
  if(isOpen&&events.length){
    const kickoffTimes=events.map(e=>e.kickoffRaw?new Date(e.kickoffRaw).getTime():null).filter(Boolean);
    if(kickoffTimes.length){
      const firstKickoff=Math.min(...kickoffTimes);
      timeLockAt=firstKickoff-60*60*1000;
      lockedByTime=Date.now()>=timeLockAt;
    }
  }
  const lmsLockedByTime=comp.mode==='lms'&&lockedByTime; // keep var for LMS-specific survived/failed banner

  const badgeText = (isOpen&&lockedByTime) ? '🔒 Locked' : (isOpen?'● Open':'✓ Done');
  const badgeCls = (isOpen&&lockedByTime) ? 'completed' : round.status;
  let html=`<div class="round-bar">
    <select class="round-select" onchange="changeRound(this.value)">${comp.rounds.map((r,i)=>`<option value="${i}"${i===ri?' selected':''}>${r.label}</option>`).join('')}</select>
    <span class="round-status ${badgeCls}">${badgeText}</span>
    <div class="round-bar-spacer"></div>
    <div class="predict-subtabs">
      <button class="ps-tab${predictSubTab==='predictions'?' active':''}" onclick="switchPredictSubTab('predictions')">Predictions</button>
      <button class="ps-tab${predictSubTab==='leaderboard'?' active':''}" onclick="switchPredictSubTab('leaderboard')">Leaderboard</button>
    </div>
    <div class="predict-subtabs-mobile">
      <select onchange="switchPredictSubTab(this.value)">
        <option value="predictions"${predictSubTab==='predictions'?' selected':''}>Predictions</option>
        <option value="leaderboard"${predictSubTab==='leaderboard'?' selected':''}>Leaderboard</option>
      </select>
    </div>
  </div>`;

  if(comp.mode==='score'){
    if(isOpen&&nextScoreLock){
      html+=`<div class="deadline-banner" id="countdown-banner">⏱ &nbsp;Predictions lock in <span id="countdown-text">Calculating...</span></div>`;
      setTimeout(()=>startCountdown(nextScoreLock._scoreLockAt,()=>renderPredict()),50);
    } else if(isOpen&&events.length&&events.every(ev=>ev.res||(ev._scoreLockAt!=null&&ev._scoreLockAt<=Date.now()))){
      html+=`<div class="deadline-banner" style="background:var(--bg);color:var(--text-2);">🔒 All predictions locked</div>`;
    }
  } else if(isOpen&&lockedByTime){
    html+=`<div class="deadline-banner" style="background:var(--bg);color:var(--text-2);">🔒 Predictions locked — match starts soon</div>`;
  } else if(isOpen&&timeLockAt){
    html+=`<div class="deadline-banner" id="countdown-banner">⏱ &nbsp;Predictions lock in <span id="countdown-text">Calculating...</span></div>`;
    setTimeout(()=>startCountdown(timeLockAt,'lock'),50);
  } else if(!isOpen&&comp.mode==='lms'){
    let userAlive=true;
    const resultedEvs=events.filter(ev=>ev.res);
    resultedEvs.forEach(ev=>{
      if(!userAlive)return;
      const p=preds[ev.id];
      if(!p){userAlive=false;return;}
      const actual=ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
      if(p!==actual)userAlive=false;
    });
    const statusHtml=resultedEvs.length?(userAlive?'<span style="color:var(--green);font-weight:700;"> · ✓ You survived!</span>':'<span style="color:var(--red);font-weight:700;"> · ✗ You failed!</span>'):'';
    html+=`<div class="deadline-banner" style="background:var(--bg);color:var(--text-2);">🔒 Predictions locked${statusHtml}</div>`;
  }

  // LMS summary bars above events (participants vs survivors)
  if(comp.mode==='lms'&&events.length){
    html+=renderLMSSummaryBars(comp,round,events);
  }


  // ── RANKING MODE ────────────────────────────────────────────────────────
  if(comp.mode==='ranking'&&round.rankingTeams){
    // Enrich ranking teams with match results from EVENTS
    const teams=round.rankingTeams.map(t=>{
      const copy={...t};
      // Find the event this team plays in
      (round.eventIds||[]).forEach(eid=>{
        const ev=EVENTS[eid];if(!ev)return;
        if(ev.home===t.name||ev.away===t.name){
          if(ev.res){
            copy.matchResult=ev.res.h+'-'+ev.res.a;
            const isHome=ev.home===t.name;
            copy.matchXG=isHome?(ev.res.home_xg||'—'):(ev.res.away_xg||'—');
            if(!copy.actualXG&&copy.matchXG!=='—') copy.actualXG=parseFloat(copy.matchXG);
          }
        }
      });
      return copy;
    });
    const predKey=round.id+'_ranking';
    const isCompleted=round.status==='completed';
    let userOrder=preds[predKey]||null;
    if(!userOrder){
      userOrder=teams.map(t=>t.id);
      preds[predKey]=userOrder;
    }
    let actualOrder=null;
    if(isCompleted){
      actualOrder=[...teams].sort((a,b)=>(b.actualXG||0)-(a.actualXG||0)).map(t=>t.id);
    }
    const teamMap={};teams.forEach(t=>{teamMap[t.id]=t;});
    let totalPts=0,correctCount=0;
    if(actualOrder){
      userOrder.forEach((tid,i)=>{if(tid===actualOrder[i])correctCount++;});
      totalPts=correctCount*(comp.rankingConfig?.pointsPerCorrect||2);
      if(correctCount===teams.length)totalPts+=(comp.rankingConfig?.perfectBonus||5);
    }
    html+=`<div style="padding:0 8px 12px;">`;
    if(isCompleted&&actualOrder){
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 8px 12px;"><span style="font-size:13px;font-weight:700;color:var(--text);">Your prediction vs Actual (${comp.rankingConfig?.metric||'xG'})</span><span style="font-family:var(--mono);font-size:14px;font-weight:800;color:${correctCount===teams.length?'var(--green)':'var(--accent)'};">${totalPts} pts</span></div>`;
      userOrder.forEach((tid,i)=>{
        const t=teamMap[tid];const isCorrect=tid===actualOrder[i];
        html+=rankRowHTML(t, i, {showResult:true, isCorrect});
      });
    } else {
    const rankingCanPredict = isOpen && !lockedByTime;
    if(rankingCanPredict){
            html+=`<div id="ranking-list" data-roundid="${round.id}">`;
      userOrder.forEach((tid,i)=>{
        const t=teamMap[tid];
        html+=rankRowHTML(t, i, {draggable:true});
      });
      html+='</div>';
      html+=`<button class="submit-preds-btn" onclick="submitRanking('${round.id}')">Save Ranking</button>`;
      setTimeout(()=>initDragSort(),50);
    } else {
      html+=`<div style="padding:8px 8px 12px;font-size:12px;color:var(--text-3);font-weight:600;">Predictions locked</div>`;
      userOrder.forEach((tid,i)=>{
        const t=teamMap[tid];
        html+=rankRowHTML(t, i, {});
      });
    }
    }
    html+='</div>';
    return html;
  }
  // Sort events by real kickoff time for LMS (not the formatted display string) — already sorted above, but keep list order consistent if reached without prior sort
  if(comp.mode==='lms') events.sort((a,b)=>new Date(a.kickoffRaw||0)-new Date(b.kickoffRaw||0));

  html+='<div class="events-list">';
  if(!events.length){
    html+='<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No events yet</div></div>';
  } else {
    let lmsBlocked=false;
    events.forEach((ev,i)=>{
      const isEliminated=eliminatedAtIdx>=0&&i>eliminatedAtIdx;
      const isEliminationPoint=i===eliminatedAtIdx;
      if(comp.mode==='lms'&&isEliminated) lmsBlocked=true;
      const effectiveOpen=comp.mode==='score'?(isOpen&&(ev._scoreLockAt==null||Date.now()<ev._scoreLockAt))
        :isOpen&&!lockedByTime&&(comp.mode==='lms'?(!lmsBlocked):true);
      html+=`<div style="opacity:${isEliminated?'0.4':'1'};">${renderEventCard(ev,comp,effectiveOpen)}</div>`;
    });
  }
  html+='</div>';

  if(isOpen&&events.length){
    const openEvents=events.filter(ev=>!ev.res);
    const predCount=openEvents.filter(ev=>{ const p=preds[ev.id]; if(!p)return false; if(comp.mode==='score')return p.h!==undefined&&p.a!==undefined; if(comp.mode==='betting')return typeof p==='object'&&Object.keys(p).length>0; return!!p; }).length;
    if(openEvents.length){
    html+=`<button class="submit-preds-btn${predsDirty?'':' disabled'}" onclick="submitPreds()">${predCount===events.length?'✓ All predictions saved':'Save Predictions ('+predCount+'/'+events.length+')'}</button>`;
    }
  }
  return html;
}



function scorePoints(pred,res,scoring){
  if(!pred||!res||res.h==null||res.a==null)return[0,''];
  const s=scoring||{exactScore:5,homeGoals:2,awayGoals:2,totalGoals:1};
  const eH=parseInt(pred.h)==res.h,eA=parseInt(pred.a)==res.a;
  if(eH&&eA)return[s.exactScore,'Exact score correct'];
  if(eH)return[s.homeGoals,'Home team goals correct'];
  if(eA)return[s.awayGoals,'Away team goals correct'];
  if((parseInt(pred.h)+parseInt(pred.a))==(res.h+res.a))return[s.totalGoals,'Total goals correct'];
  return[0,'No points scored'];
}

function renderEventCard(ev,comp,isOpen){
  const pred=preds[ev.id]??null;
  const hasRes=!!ev.res;
  const isLocked=ev.locked||false;
  // Event is "open for input" only if: round is open AND event has no result AND not locked
  const canPredict=isOpen&&!hasRes&&!isLocked;
  const hasPred=comp.mode==='score'?(pred&&pred.h!==undefined&&pred.a!==undefined):comp.mode==='betting'?(pred&&typeof pred==='object'&&Object.keys(pred).length>0):(pred!==null&&pred!==undefined);

  let correct=null,earnedPts=null,pointsBreakdown='';
  if(hasRes&&hasPred){
    if(comp.mode==='lms'){const actual=ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';correct=pred===actual;}
    else if(comp.mode==='score'){[earnedPts,pointsBreakdown]=scorePoints(pred,ev.res,comp.scoring);correct=earnedPts>0;}
    else if(comp.mode==='betting'&&typeof pred==='object'){
      earnedPts=0;
      const marketResults=[];
      (comp.markets||[]).forEach(mkt=>{
        const pick=pred[mkt.type]; if(!pick) return;
        let actualM=null;
        if(mkt.type==='1x2') actualM = ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
        else if(mkt.type==='ou25') actualM = (ev.res.h+ev.res.a)>2.5?'O':'U';
        else if(mkt.type==='btts') actualM = (ev.res.h>0&&ev.res.a>0)?'Y':'N';
        const isRight = pick===actualM;
        if(isRight) earnedPts+=(mkt.points||0);
        marketResults.push(mkt.label+(isRight?' \u2713':' \u2717'));
      });
      correct=earnedPts>0;
      pointsBreakdown=marketResults.join(' \u00b7 ');
    }
  }

  let cls='event-card';
  if(canPredict&&hasPred)cls+=' predicted';
  if(!canPredict)cls+=' locked-pred';

  const hv=(pred&&pred.h!==undefined)?pred.h:'';
  const av=(pred&&pred.a!==undefined)?pred.a:'';

  // Middle section (score inputs, result, or locked pick)
  let midSection;
  if(comp.mode==='score'&&canPredict){
    midSection=`<div class="score-inline-mid"><input class="score-num-inline${hv!==''?' has':''}" type="number" min="0" max="20" placeholder="0" value="${hv}" id="sh-${ev.id}" oninput="pickScore('${ev.id}','h',this.value)"><span class="score-inline-dash">\u2013</span><input class="score-num-inline${av!==''?' has':''}" type="number" min="0" max="20" placeholder="0" value="${av}" id="sa-${ev.id}" oninput="pickScore('${ev.id}','a',this.value)"></div>`;
  } else if(hasRes){
    midSection=`<div class="ev-score">${ev.res.h}\u2013${ev.res.a}</div>`;
  } else if(comp.mode==='score'&&hasPred&&!hasRes){
    midSection=`<div class="ev-score">${pred.h??'-'}\u2013${pred.a??'-'}</div>`;
  } else {
    midSection='<div class="ev-vs">vs</div>';
  }

  let html=`<div class="${cls}" data-evid="${ev.id}"><div class="event-card-top"><div class="event-meta"><span class="event-league">${ev.tournament||comp.name}</span><span class="event-kickoff">${ev.kickoff||''}</span></div><div class="event-teams"><div style="display:flex;align-items:center;gap:10px;min-width:0;">${teamBadge(ev.homeLogo,ev.home)}<span class="ev-name">${ev.home}</span></div>${midSection}<div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;min-width:0;"><span class="ev-name" style="text-align:right;">${ev.away}</span>${teamBadge(ev.awayLogo,ev.away)}</div></div></div><div class="pred-area">`;

  if(canPredict){
    // Open for prediction
    if(comp.mode==='lms'){
      html+=`<div class="btns-1x2"><button class="btn-1x2${pred==='H'?' selected home':''}" data-val="H" onclick="pick('${ev.id}','H')">Home Win</button><button class="btn-1x2${pred==='D'?' selected draw':''}" data-val="D" onclick="pick('${ev.id}','D')">X</button><button class="btn-1x2${pred==='A'?' selected away':''}" data-val="A" onclick="pick('${ev.id}','A')">Away</button></div>`;
    } else if(comp.mode==='score'){
      html+='<div style="font-size:11px;color:var(--text-3);text-align:center;padding:2px 0;">Enter scores above \u2191</div>';
    } else if(comp.mode==='betting'){
      const markets=comp.markets||[];const mpred=(pred&&typeof pred==='object')?pred:{};
      html+='<div style="display:flex;flex-direction:column;gap:8px;">';
      markets.forEach(mkt=>{
        html+=`<div><div class="pred-label" style="margin-bottom:5px;font-size:13px;font-weight:600;color:oklch(0.4 0.01 260);">${mkt.label}</div>`;
        const isLocked=ev.locked||false;
        const dis=isLocked?'disabled style="pointer-events:none;opacity:0.7;"':'';
        if(mkt.type==='1x2')html+=`<div class="btns-1x2"><button class="btn-1x2${mpred['1x2']==='H'?' selected home':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'1x2\',\'H\')'}">Home Win</button><button class="btn-1x2${mpred['1x2']==='D'?' selected draw':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'1x2\',\'D\')'}">X</button><button class="btn-1x2${mpred['1x2']==='A'?' selected away':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'1x2\',\'A\')'}">Away</button></div>`;
        else if(mkt.type==='ou25')html+=`<div class="btns-ou"><button class="btn-ou over${mpred['ou25']==='O'?' selected':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'ou25\',\'O\')'}">Over</button><button class="btn-ou under${mpred['ou25']==='U'?' selected':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'ou25\',\'U\')'}">Under</button></div>`;
        else if(mkt.type==='btts')html+=`<div class="btns-ou"><button class="btn-ou over${mpred['btts']==='Y'?' selected':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'btts\',\'Y\')'}">Yes</button><button class="btn-ou under${mpred['btts']==='N'?' selected':''}" ${isLocked?'disabled':'onclick="pickMarket(\'${ev.id}\',\'btts\',\'N\')'}">No</button></div>`;
        html+='</div>';
      });
      html+='</div>';
    }
  } else if(hasPred){
    // Locked — show pick and optionally points
    let pl='';
    if(comp.mode==='lms')pl=pred==='H'?ev.home+' (Home)':pred==='D'?'Draw':ev.away+' (Away)';
    else if(comp.mode==='score')pl=(pred.h??'-')+' \u2013 '+(pred.a??'-');
    else if(comp.mode==='betting'&&typeof pred==='object')pl=Object.entries(pred).map(([k,v])=>k.toUpperCase()+': '+v).join(' \u00b7 ');

    if(hasRes&&(comp.mode==='score'||comp.mode==='betting')&&earnedPts!=null){
      html+=`<div class="pred-result-row"><div class="pred-made">Your pick: <strong>${pl}</strong></div><span class="pred-correct ${earnedPts>0?'yes':'no'}">${earnedPts>0?'+'+earnedPts+' pts':'\u2717 0 pts'}</span></div>`;
      if(pointsBreakdown)html+=`<div style="font-size:12px;color:${earnedPts>0?'var(--green)':'var(--text-3)'};margin-top:4px;font-weight:600;">${pointsBreakdown}</div>`;
    } else if(hasRes&&correct!=null){
      html+=`<div class="pred-result-row"><div class="pred-made">Your pick: <strong>${pl}</strong></div><span class="pred-correct ${correct?'yes':'no'}">${correct?'\u2713 Correct':'\u2717 Wrong'}</span></div>`;
      if(comp.mode==='lms'&&ev._survivorCount!==undefined){
        html+=`<div style="text-align:left;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--text-2);margin-top:6px;">${ev._survivorCount} survived</div>`;
      }
    } else {
      if(comp.mode==='betting'&&typeof pred==='object'){
        var mpred2=pred;
        html+='<div style="display:flex;flex-direction:column;gap:8px;">';
        (comp.markets||[]).forEach(function(mkt){
          html+='<div><div style="margin-bottom:5px;font-size:13px;font-weight:600;color:oklch(0.4 0.01 260);">'+mkt.label+'</div>';
          var h=mpred2['1x2'],o=mpred2['ou25'],b=mpred2['btts'];
          if(mkt.type==='1x2')html+='<div class="btns-1x2">'
            +'<button class="btn-1x2'+(h==='H'?' selected home':'')+'" disabled>Home Win</button>'
            +'<button class="btn-1x2'+(h==='D'?' selected draw':'')+'" disabled>X</button>'
            +'<button class="btn-1x2'+(h==='A'?' selected away':'')+'" disabled>Away</button>'
            +'</div>';
          else if(mkt.type==='ou25')html+='<div class="btns-ou">'
            +'<button class="btn-ou over'+(o==='O'?' selected':'')+'" disabled>Over</button>'
            +'<button class="btn-ou under'+(o==='U'?' selected':'')+'" disabled>Under</button>'
            +'</div>';
          else if(mkt.type==='btts')html+='<div class="btns-ou">'
            +'<button class="btn-ou over'+(b==='Y'?' selected':'')+'" disabled>Yes</button>'
            +'<button class="btn-ou under'+(b==='N'?' selected':'')+'" disabled>No</button>'
            +'</div>';
          html+='</div>';
        });
        html+='<div style="font-size:11px;color:oklch(0.58 0.01 260);margin-top:4px;">⏳ Awaiting result</div>';
        html+='</div>';
      } else {
        html+=`<div><div class="pred-made">Your pick: <strong>${pl}</strong></div><div style="margin-top:4px;"><span style="font-size:11px;color:var(--amber);font-weight:600;">⏳ Awaiting result</span></div></div>`;
      }
    }
  } else {
    html+='<div style="font-size:12px;color:var(--text-3);">No prediction made.</div>';
    if(comp.mode==='lms'&&hasRes&&ev._survivorCount!==undefined){
      html+=`<div style="text-align:left;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--text-2);margin-top:6px;">${ev._survivorCount} survived</div>`;
    }
  }
  html+='</div></div>';return html;
}

async function loadAndRenderLeaderboard(comp){
  const ri=selectedRound[currentCompIdx]??0;
  const round=comp.rounds[ri];
  const target=document.getElementById('lb-content');
  if(!round||!target) return;

  try{
    const {data:allPreds,error}=await supa.from('gw_predictions')
      .select('username,player_id,event_id,prediction')
      .eq('client_key',CLIENT_PARAM)
      .eq('competition_id',comp.id)
      .eq('round_id',round.id);
    if(error) throw error;

    if(!allPreds || !allPreds.length){
      target.innerHTML='<div class="empty" style="padding:40px 20px;"><div class="empty-icon">🏆</div><div class="empty-title">No predictions yet</div><div class="empty-sub">Be the first to predict this round.</div></div>';
      return;
    }

    // Group by username — every user here has at least one prediction, regardless of points
    const byUser={};
    allPreds.forEach(p=>{
      const uname=p.username||p.player_id;
      if(!byUser[uname]) byUser[uname]=[];
      byUser[uname].push(p);
    });
    const unwrap=v=>(v&&typeof v==='object'&&'value'in v)?v.value:v;

    const rows=[];
    if(comp.mode==='score'){
      Object.entries(byUser).forEach(([uname,userPreds])=>{
        let pts=0, correct=0;
        userPreds.forEach(p=>{
          const ev=EVENTS[p.event_id]; if(!ev||!ev.res) return;
          const val=unwrap(p.prediction);
          const [earned]=scorePoints(val,ev.res,comp.scoring);
          pts+=earned; if(earned>0)correct++;
        });
        rows.push({u:uname,pts,correct,total:userPreds.length});
      });
      rows.sort((a,b)=>b.pts-a.pts||b.correct-a.correct);
      rows.forEach((r,i)=>r.rank=i+1);
      target.innerHTML=buildLBTable('Leaderboard',round.label,rows,
        row=>`<td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--text);">${row.pts} pts</td><td style="text-align:right;font-size:11px;color:var(--text-3);">${row.correct}/${row.total}</td>`,
        '<th style="width:80px;text-align:right;">Points</th><th style="width:80px;text-align:right;">Correct</th>',
        round.prizes);
    } else if(comp.mode==='lms'){
      const events=(round.eventIds||[]).map(id=>({id,...EVENTS[id]})).filter(e=>e.home)
        .sort((a,b)=>new Date(a.kickoffRaw||0)-new Date(b.kickoffRaw||0));
      Object.entries(byUser).forEach(([uname,userPreds])=>{
        const predMap={}; userPreds.forEach(p=>{ predMap[p.event_id]=unwrap(p.prediction); });
        let survived=0, eliminated=false;
        for(const ev of events){
          const pick=predMap[ev.id];
          if(!pick||!ev.res) break;
          const actual = ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
          if(pick===actual){ survived++; } else { eliminated=true; break; }
        }
        rows.push({u:uname,survived,eliminated,total:events.length});
      });
      rows.sort((a,b)=> a.eliminated===b.eliminated ? b.survived-a.survived : (a.eliminated?1:-1));
      rows.forEach((r,i)=>r.rank=i+1);
      target.innerHTML=buildLBTable('Leaderboard',round.label,rows,
        row=>`<td style="text-align:right;font-family:var(--mono);font-weight:800;color:${row.eliminated?'var(--red)':'var(--green)'};">${row.eliminated?'✗ Eliminated':'✓ Alive'}</td><td style="text-align:right;font-size:11px;color:var(--text-3);">${row.survived}/${row.total}</td>`,
        '<th style="width:110px;text-align:right;">Status</th><th style="width:80px;text-align:right;">Survived</th>',
        round.prizes);
    } else if(comp.mode==='betting'){
      Object.entries(byUser).forEach(([uname,userPreds])=>{
        let pts=0;
        userPreds.forEach(p=>{
          const ev=EVENTS[p.event_id]; if(!ev||!ev.res) return;
          const val=(p.prediction&&typeof p.prediction==='object')?p.prediction:{};
          (comp.markets||[]).forEach(mkt=>{
            const pick=val[mkt.type];
            if(!pick) return;
            let actual=null;
            if(mkt.type==='1x2') actual = ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
            else if(mkt.type==='ou25') actual = (ev.res.h+ev.res.a)>2.5?'O':'U';
            else if(mkt.type==='btts') actual = (ev.res.h>0&&ev.res.a>0)?'Y':'N';
            if(pick===actual) pts+=(mkt.points||0);
          });
        });
        rows.push({u:uname,pts});
      });
      rows.sort((a,b)=>b.pts-a.pts);
      rows.forEach((r,i)=>r.rank=i+1);
      target.innerHTML=buildLBTable('Leaderboard',round.label,rows,
        row=>`<td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--text);">${row.pts} pts</td>`,
        '<th style="width:90px;text-align:right;">Points</th>',
        round.prizes);
    } else if(comp.mode==='ranking'&&round.rankingTeams){
      const teams=round.rankingTeams;
      const actualOrder = round.status==='completed' ? [...teams].sort((a,b)=>(b.actualXG||0)-(a.actualXG||0)).map(t=>t.id) : null;
      Object.entries(byUser).forEach(([uname,userPreds])=>{
        const p = userPreds.find(pp=>pp.event_id===round.id+'_ranking');
        const order = p ? unwrap(p.prediction) : null;
        let pts=0, correct=0;
        if(order&&actualOrder){
          order.forEach((tid,i)=>{ if(tid===actualOrder[i]) correct++; });
          pts=correct*(comp.rankingConfig?.pointsPerCorrect||2);
          if(correct===teams.length) pts+=(comp.rankingConfig?.perfectBonus||5);
        }
        rows.push({u:uname,pts,correct,total:teams.length});
      });
      rows.sort((a,b)=>b.pts-a.pts);
      rows.forEach((r,i)=>r.rank=i+1);
      target.innerHTML=buildLBTable('Leaderboard',round.label,rows,
        row=>`<td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--text);">${row.pts} pts</td><td style="text-align:right;font-size:11px;color:var(--text-3);">${row.correct}/${row.total}</td>`,
        '<th style="width:80px;text-align:right;">Points</th><th style="width:80px;text-align:right;">Correct</th>',
        round.prizes);
    } else {
      const rows2=Object.keys(byUser).map((u,i)=>({u,rank:i+1}));
      target.innerHTML=buildLBTable('Leaderboard',round.label,rows2,
        ()=>'<td style="text-align:right;font-size:11px;color:var(--text-3);">—</td>',
        '<th style="width:90px;text-align:right;"></th>', round.prizes);
    }
  }catch(e){
    console.error('loadAndRenderLeaderboard:',e);
    target.innerHTML='<div class="empty" style="padding:40px 20px;"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load leaderboard</div></div>';
  }
}

function buildLBTable(title,sub,rows,cellFn,colHeader,prizes){
  const me=currentPlayer?.username;
  const prizeMap={};
  (prizes||[]).forEach(p=>{prizeMap[p.pos]=p.text;});
  const hasPrizes=Object.keys(prizeMap).length>0;
  let html=`<div class="lb-wrap"><div class="lb-table-head"><span class="lb-table-head-title">${title}</span><span class="lb-table-head-sub">${sub}</span></div><table class="lb-table" style="table-layout:fixed;"><thead><tr><th style="width:32px;text-align:center">#</th><th style="width:auto;">Player</th>${colHeader}${hasPrizes?'<th style="width:150px;text-align:left;">Prize</th>':''}</tr></thead><tbody>`;
  rows.forEach(row=>{
    const isMe=row.u===me,ini=(row.u||'?').slice(0,2).toUpperCase();
    const prizeText=prizeMap[row.rank];
    const prizeCell=hasPrizes?`<td style="width:150px;text-align:left;font-size:11px;color:${prizeText?'var(--text)':'var(--text-3)'};font-weight:${prizeText?'700':'400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${prizeText||''}">${prizeText?'🏆 '+prizeText:'—'}</td>`:'';
    html+=`<tr class="${isMe?'me':''}"><td class="lb-rank ${row.rank<=3?'top':''}">${row.rank<=3?MEDALS[row.rank-1]:row.rank}</td><td><div class="lb-user"><div class="lb-av ${isMe?'me':''}">${ini}</div><span class="lb-uname ${isMe?'me':''}">${row.u}${isMe?'<span class="you-tag">YOU</span>':''}</span></div></td>${cellFn(row)}${prizeCell}</tr>`;
  });
  html+=`</tbody></table></div>`; return html;
}

async function renderProfile(){
  if(!currentPlayer)return;
  const ini=currentPlayer.username.slice(0,2).toUpperCase();
  const joined=currentPlayer.joined_at?new Date(currentPlayer.joined_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'Today';
  const totalPreds=Object.keys(preds).length;

  // Calculate hit rate from predictions with results
  let hits=0,resulted=0;
  Object.entries(preds).forEach(([eid,pred])=>{
    const ev=EVENTS[eid];if(!ev||!ev.res)return;
    resulted++;
    if(typeof pred==='object'&&pred.h!==undefined){
      if(parseInt(pred.h)==ev.res.h&&parseInt(pred.a)==ev.res.a)hits++;
    } else if(typeof pred==='string'){
      const actual=ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
      if(pred===actual)hits++;
    }
  });
  const hitRate=resulted>0?Math.round(hits/resulted*100):0;

  // Build competition list with points and rank
  let activeHtml='',endedHtml='';
  for(const comp of COMPS){
    const isActive=comp.rounds.some(r=>r.status==='open');
    // Fetch player's total points and rank
    try{
      const {data:allPreds}=await supa.from('gw_predictions').select('username,player_id,event_id,prediction').eq('client_key',CLIENT_PARAM).eq('competition_id',comp.id);
      if(!allPreds||!allPreds.length)continue;

      // Calculate points per player
      const players={};
      allPreds.forEach(p=>{
        const ev=EVENTS[p.event_id];const v=p.prediction;
        let pts=0;
        if(ev&&ev.res&&comp.mode==='score'){
          const predObj=(v&&typeof v==='object'&&'value' in v)?v.value:v;
          if(predObj&&typeof predObj==='object'&&predObj.h!==undefined){
            const s=comp.scoring||{exactScore:5,homeGoals:2,awayGoals:2,totalGoals:1};
            const eH=parseInt(predObj.h)==ev.res.h,eA=parseInt(predObj.a)==ev.res.a;
            if(eH&&eA)pts=s.exactScore;else if(eH)pts=s.homeGoals;else if(eA)pts=s.awayGoals;
            else if((parseInt(predObj.h)+parseInt(predObj.a))==(ev.res.h+ev.res.a))pts=s.totalGoals;
          }
        }
        if(!players[p.player_id])players[p.player_id]={u:p.username,points:0};
        players[p.player_id].points+=pts;
      });

      const sorted=Object.entries(players).sort((a,b)=>b[1].points-a[1].points);
      const myEntry=sorted.find(([pid])=>pid===currentPlayer.id);
      const myPoints=myEntry?myEntry[1].points:0;
      const myRank=myEntry?sorted.indexOf(myEntry)+1:sorted.length+1;
      const total=sorted.length;
      const color=comp.color||'#4F46E5';

      const row=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);${isActive?'':'opacity:0.7;'}">
        <div style="width:4px;height:32px;border-radius:2px;background:${color};flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);">${comp.name}</div>
          <div style="font-size:10px;color:var(--text-3);">${MODE_LABELS[comp.mode]||comp.mode}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--mono);font-size:14px;font-weight:800;color:var(--text);">${myPoints} pts</div>
          <div style="font-size:10px;color:var(--text-3);">#${myRank} of ${total}</div>
        </div>
      </div>`;
      if(isActive)activeHtml+=row;else endedHtml+=row;
    }catch(e){console.error('profile comp:',e);}
  }

  document.getElementById('profile-content').innerHTML=`
    <div style="padding:10px 16px 0;"><button onclick="goTab('predict')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--accent);font-weight:700;font-family:var(--mono);">← Back to predictions</button></div>
    <div class="profile-header"><div class="profile-av">${ini}</div><div class="profile-name">${currentPlayer.username}</div><div class="profile-joined">Joined ${joined}</div></div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="ps-val">${totalPreds}</div><div class="ps-label">Total Predictions</div></div>
      <div class="profile-stat"><div class="ps-val">${hitRate}%</div><div class="ps-label">Hit Rate</div></div>
      <div class="profile-stat"><div class="ps-val">${COMPS.length}</div><div class="ps-label">Competitions</div></div>
    </div>
    ${activeHtml?`<div class="profile-section"><div class="profile-section-title">Active Competitions</div>${activeHtml}</div>`:''}
    ${endedHtml?`<div class="profile-section"><div class="profile-section-title">Ended Competitions</div>${endedHtml}</div>`:''}
    <div class="profile-section">
      <div class="profile-section-title">Account</div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:14px;">
        <div>Username: <strong>${currentPlayer.username}</strong></div>
        ${currentPlayer.email?`<div>Email: <strong>${currentPlayer.email}</strong></div>`:''}
      </div>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  try{
    // Wait for Supabase to fully restore session from storage
    const session = await new Promise(resolve => {
      const {data:{subscription}} = supa.auth.onAuthStateChange((event, sess) => {
        if(event === 'INITIAL_SESSION'){
          subscription.unsubscribe();
          resolve(sess);
        }
      });
      setTimeout(async ()=>{
        subscription.unsubscribe();
        const {data:{session:s}} = await supa.auth.getSession();
        resolve(s);
      }, 3000);
    });
    await buildCompsFromRealData();

    if(session){
      const {data:player} = await supa.from('gw_players').select('*').eq('auth_id',session.user.id).eq('client_key',CLIENT_PARAM).single();
      if(player){ currentPlayer=player; try{ await loadPlayerPreds(); }catch(e){} }
    }

    if(CLIENT_PARAM&&CLIENT_PARAM!=='demo'){
      try{
        const {data:op} = await supa.from('gw_operators').select('company_name,logo_url').eq('client_key',CLIENT_PARAM).single();
        if(op){
          document.getElementById('hdr-operator-badge').textContent='· '+op.company_name;
          if(op.logo_url){
            const logoEl = document.getElementById('hdr-logo');
            if(logoEl) logoEl.innerHTML = `<img src="${op.logo_url}" alt="${op.company_name||'Logo'}" style="height:28px;max-width:160px;object-fit:contain;vertical-align:middle;">`;
          }
        }
      }catch(e){}
    }
  }catch(err){ console.error('Init:',err); }
  finally{ updateHeaderUser(); renderCompTabs(); goTab('predict'); }
})();
