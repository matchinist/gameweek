<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Gameweek</title>
<style>
  :root{ --accent:#4F46E5; --accent-2:#4338CA; --text:#111827; --text-2:#374151; --text-3:#9CA3AF; --border:#E5E7EB; --bg:#F7F8FA; --white:#fff; --green:#16A34A; --red:#DC2626; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{background:var(--white);border-radius:14px;max-width:380px;width:100%;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .logo{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;text-align:center;margin-bottom:4px;}
  .logo span{color:var(--accent);}
  .sub{text-align:center;font-size:13px;color:var(--text-3);margin-bottom:24px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;}
  input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:16px;}
  button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;}
  button:hover{background:var(--accent-2);}
  button:disabled{opacity:0.6;cursor:default;}
  .msg{text-align:center;font-size:13px;margin-top:14px;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">game<span>week</span></div>
  <div class="sub">Set a new password</div>

  <div id="form-area">
    <label>New password</label>
    <input type="password" id="new-password" placeholder="min 6 characters" />
    <label>Confirm password</label>
    <input type="password" id="confirm-password" placeholder="re-enter password" onkeydown="if(event.key==='Enter')updatePassword()" />
    <button id="submit-btn" onclick="updatePassword()">Update password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPA_URL = 'https://mgfzqkesikfdrahherfm.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nZnpxa2VzaWtmZHJhaGhlcmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjA5ODAsImV4cCI6MjA5NTAzNjk4MH0.uzhqaPtsEE-dthbpv1tl6krZj7FidfTblV_7ilcAxFI';
  const supa = supabase.createClient(SUPA_URL, SUPA_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'gw-operator'}});

  // When the user lands here from the email link, Supabase puts a recovery token
  // in the URL hash and the client picks it up, creating a temporary session.
  let canReset = false;
  supa.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY' || (session && event === 'SIGNED_IN')) {
      canReset = true;
    }
  });

  async function updatePassword(){
    const pw = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    if(pw.length < 6){ msg.textContent='Password must be at least 6 characters.'; msg.style.color='var(--red)'; return; }
    if(pw !== confirm){ msg.textContent='Passwords do not match.'; msg.style.color='var(--red)'; return; }

    btn.disabled=true; btn.textContent='Updating…'; msg.textContent='';

    const {error} = await supa.auth.updateUser({ password: pw });
    if(error){
      btn.disabled=false; btn.textContent='Update password';
      msg.textContent=error.message; msg.style.color='var(--red)';
      return;
    }

    msg.textContent='✓ Password updated. Redirecting to sign in…';
    msg.style.color='var(--green)';
    setTimeout(()=>{ window.location.href='/'; }, 2000);
  }

  // If there's no recovery token at all, show a hint
  setTimeout(()=>{
    if(!canReset && !window.location.hash.includes('access_token')){
      document.getElementById('msg').textContent='Open this page from the reset link in your email.';
      document.getElementById('msg').style.color='var(--text-3)';
    }
  }, 1500);
</script>
</body>
</html>
