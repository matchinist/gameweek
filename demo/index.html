function rlToggleEvent(eventId){
  rlSaveCurrentState();
  rlExpandedEventId = (rlExpandedEventId===eventId) ? null : eventId;
  const el=document.getElementById('predict-content');
  if(el){el.innerHTML=renderRouletteHTML();}
  if(rlExpandedEventId){
    rlLoadState(rlExpandedEventId);
    setTimeout(()=>initRouletteBoard(),50);
  }
}

function rlSaveCurrentState(){
  if(rlExpandedEventId) RL_STATE[rlExpandedEventId]={remaining:rlRemaining, stakes:{...rlStakes}};
}
function rlLoadState(eventId){
  const saved=RL_STATE[eventId];
  rlRemaining = saved ? saved.remaining : RL_BUDGET;
  rlStakes = saved ? {...saved.stakes} : {};
}

function initRouletteBoard(){
  rlMeta={};
  const gridEl=document.getElementById('rl-grid');
  if(!gridEl)return;
  gridEl.innerHTML='';

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const id=rlCellId(r,c);
      const type=rlCellType(RL_HOME[r],RL_AWAY[c]);
      const bg=type==='draw'?'var(--surface)':type==='home'?'var(--accent-light)':'#FFEDD5';
      const div=document.createElement('div');
      div.id=id; div.dataset.h=RL_HOME[r]; div.dataset.a=RL_AWAY[c]; div.dataset.baseBg=bg;
      div.style.cssText=`position:relative;border-radius:12px;border:1px solid var(--border);background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .1s,outline .15s,box-shadow .15s;`;
      div.onclick=()=>rlAddChip(id);
      div.innerHTML=`<span id="rlminus_${id}" onclick="event.stopPropagation();rlRemoveChip('${id}')" style="position:absolute;top:-7px;right:-7px;width:19px;height:19px;border-radius:50%;background:var(--red);color:white;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;z-index:6;">−</span>
        <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);">${rlScoreLabel(r,c)}</span>
        <span id="rlchip_${id}" style="display:none;margin-top:5px;font-family:var(--mono);font-size:12px;font-weight:700;color:white;background:var(--accent);border-radius:8px;padding:2px 9px;min-width:24px;text-align:center;"></span>`;
      gridEl.appendChild(div);
      rlMeta[id]={label:rlScoreLabel(r,c)+' correct score',mult:16,type:'SCORE'};
    }
  }
  rlMeta['rlbtts_Y']={label:'Both teams to score: Yes',mult:2,type:'MARKET'};
  rlMeta['rlbtts_N']={label:'Both teams to score: No',mult:2,type:'MARKET'};
  rlMeta['rlou_O']={label:'Over 2.5 goals',mult:2,type:'MARKET'};
  rlMeta['rlou_U']={label:'Under 2.5 goals',mult:2,type:'MARKET'};

  Object.keys(rlMeta).forEach(rlRender);
  rlUpdateFooter();
  rlFitBoard();
}

function rlFitBoard(){
  const outer=document.getElementById('rl-scale-outer');
  const inner=document.getElementById('rl-scale-inner');
  if(!outer||!inner)return;
  inner.style.transform='none';
  const naturalW=inner.offsetWidth;
  const naturalH=inner.offsetHeight;
  const availW=outer.clientWidth;
  const scale=Math.min(1, availW/naturalW);
  inner.style.transform=`scale(${scale})`;
  outer.style.height=(naturalH*scale)+'px';
}
window.addEventListener('resize',()=>{ if(document.getElementById('rl-scale-outer'))rlFitBoard(); });

function rlAddChip(id){
  if(rlRemaining<RL_STEP)return;
  rlStakes[id]=(rlStakes[id]||0)+RL_STEP;
  rlRemaining-=RL_STEP;
  rlRender(id);
  rlHighlightGrid();
}
function rlRemoveChip(id){
  if(!rlStakes[id])return;
  rlStakes[id]-=RL_STEP;
  rlRemaining+=RL_STEP;
  if(rlStakes[id]<=0)delete rlStakes[id];
  rlRender(id);
  rlHighlightGrid();
}
function rlClearAll(){
  Object.keys(rlStakes).forEach(k=>delete rlStakes[k]);
  rlRemaining=RL_BUDGET;
  Object.keys(rlMeta).forEach(rlRender);
  rlHighlightGrid();
}
function rlRender(id){
  const el=document.getElementById(id);
  const chipEl=document.getElementById('rlchip_'+id);
  const minusEl=document.getElementById('rlminus_'+id);
  const val=rlStakes[id]||0;
  const isMarket = id.startsWith('rlbtts_')||id.startsWith('rlou_');
  if(chipEl){
    chipEl.textContent=val;
    chipEl.style.display=val>0?(isMarket?'block':'inline-block'):'none';
  }
  if(minusEl){minusEl.style.display=val>0?'flex':'none';}
  rlUpdateFooter();
}
// Which score cells match a given special market ("both teams to score" / "over-under")
function rlMatchesMarket(marketId, h, a){
  const total=h+a;
  if(marketId==='rlbtts_Y') return h>0 && a>0;
  if(marketId==='rlbtts_N') return h===0 || a===0;
  if(marketId==='rlou_O') return total>2.5;
  if(marketId==='rlou_U') return total<=2.5;
  return false;
}
// Hover preview — shows what a market would highlight even before it's staked
function rlPreviewHighlight(marketId){
  rlApplyGridHighlight([marketId]);
}
// Persistent highlight — reflects whatever markets are actually staked right now
function rlHighlightGrid(){
  const active=['rlbtts_Y','rlbtts_N','rlou_O','rlou_U'].filter(id=>(rlStakes[id]||0)>0);
  rlApplyGridHighlight(active);
}
function rlApplyGridHighlight(marketIds){
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const id=rlCellId(r,c);
      const el=document.getElementById(id);
      if(!el)continue;
      const h=rlNumVal(RL_HOME[r]), a=rlNumVal(RL_AWAY[c]);
      const match = marketIds.some(mid=>rlMatchesMarket(mid,h,a));
      el.style.boxShadow = match ? '0 0 0 2.5px #F59E0B' : 'none';
    }
  }
}
function rlUpdateFooter(){
  const staked=RL_BUDGET-rlRemaining;
  const coinEl=document.getElementById('rl-coin-value');
  if(coinEl){coinEl.textContent=rlRemaining;coinEl.style.color=rlRemaining===0?'#DC2626':'var(--text)';}
  const stakedEl=document.getElementById('rl-staked-count');
  if(stakedEl)stakedEl.textContent=staked;
  const btn=document.getElementById('rl-place-btn');
  if(btn)btn.disabled=staked===0;
  rlRenderBetslip();
}
function rlRenderBetslip(){
  const el=document.getElementById('rl-betslip');
  if(!el)return;
  const ids=Object.keys(rlStakes);
  if(!ids.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Bet Slip</div>'+ids.map(id=>{
    const m=rlMeta[id]; if(!m) return '';

function rlChangeGameweek(idx){
  selectedRound[currentCompIdx]=parseInt(idx);

function submitPreds(){
  predsDirty=false;
  const btn=document.querySelector('.submit-preds-btn');
  if(btn){btn.classList.add('disabled');btn.textContent='\u2713 Saved';}
  const comp=COMPS[currentCompIdx],round=comp.rounds[selectedRound[currentCompIdx]];
  if(!round)return;
  const events=round.eventIds.map(id=>({id,...EVENTS[id]})).filter(e=>e.home&&!e.res&&!e.locked);
  const done=events.filter(ev=>{const p=preds[ev.id];return p&&p.h!==undefined&&p.a!==undefined;}).length;
  toast('\u2713 '+done+' of '+events.length+' predictions saved');
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────
function renderLineupLeaderboardShell(comp){
  const currentIdx = computeCurrentRoundIdx(comp);
  const maxIdx = currentIdx!=null ? currentIdx : comp.rounds.length-1;
  if(lbSelection[currentCompIdx]===undefined) lbSelection[currentCompIdx]=maxIdx; // default: current gameweek, not Overall
  const sel = lbSelection[currentCompIdx];
  const isOverall = sel==='overall';
  const round = isOverall ? null : (comp.rounds[sel]||comp.rounds[maxIdx]);
  const roundOptions = comp.rounds.slice(0, maxIdx+1).map((r,i)=>`<option value="${i}"${sel===i?' selected':''}>${r.label}</option>`).join('');
  const roundSelect = `<option value="overall"${isOverall?' selected':''}>Overall</option>${roundOptions}`;
  let html=controlBandOpen(comp, roundSelect,
    `<button class="ps-tab${predictSubTab==='predictions'?' active':''}" onclick="switchPredictSubTab('predictions')">Builder</button>
     <button class="ps-tab${predictSubTab==='leaderboard'?' active':''}" onclick="switchPredictSubTab('leaderboard')">Leaderboard</button>`,
    `<button class="ps-tab${predictSubTab==='predictions'?' active':''}" onclick="switchPredictSubTab('predictions')">Predictions</button><button class="ps-tab${predictSubTab==='leaderboard'?' active':''}" onclick="switchPredictSubTab('leaderboard')">Leaderboard</button>`,
    'changeLBSelection(this.value)');
  html+='</div>';
  const rows=LINEUP_LB.map(row=>({u:row.u, points:isOverall?row.pts+row.pts:row.pts, correct:row.correct}));
  rows.sort((a,b)=>b.points-a.points);
  let rank=1;
  rows.forEach((r,i)=>{if(i>0&&rows[i].points<rows[i-1].points)rank=i+1;r.rank=rank;});
  const activePrizes=isOverall?comp.overallPrizes:round?.prizes;
  html+=buildLBTable(comp.name, isOverall?'Overall':(round?.label||''), rows,
    r=>`<td class="lb-num">${r.points} pts</td>`, '<th class="r" style="width:80px;">Points</th>',
    activePrizes,
    r=>`<td class="lb-num">${r.correct||0}/11</td>`, '<th class="r" style="width:70px;">Accuracy</th>');
  return html;
}
function renderLeaderboardPane(comp){
  if(comp.mode==='lineup') return renderLineupPredictor(comp);
  if(comp.mode==='roulette'){
    return renderRouletteLeaderboardShell(comp);
  }
  if(lbSelection[currentCompIdx]===undefined)lbSelection[currentCompIdx]=getDefaultRoundIdx(comp);
  const sel=lbSelection[currentCompIdx],isOverall=sel==='overall';
  const round=isOverall?null:comp.rounds[sel];
  const ri=selectedRound[currentCompIdx]??0;

  // Same control band card as predictions pane, no countdown needed here
  let html=controlBandOpen(comp,
    `${comp.rounds.map((r,i)=>`<option value="${i}" ${(!isOverall&&sel===i)?'selected':''}>${r.label}${r.status==='open'?' (Current)':''}</option>`).join('')}<option value="overall" ${isOverall?'selected':''}>Overall</option>`,
    `<button class="ps-tab" onclick="switchPredictSubTab('predictions')">Predictions</button>
     <button class="ps-tab active" onclick="switchPredictSubTab('leaderboard')">Leaderboard</button>`,
    `<button class="ps-tab${predictSubTab==='predictions'?' active':''}" onclick="switchPredictSubTab('predictions')">Predictions</button><button class="ps-tab${predictSubTab==='leaderboard'?' active':''}" onclick="switchPredictSubTab('leaderboard')">Leaderboard</button>`,
    'changeLBSelection(this.value)');
  html+='</div>';

  const cData=LB_DATA[comp.id];
  const rKey=isOverall?'overall':(round?.id||'');
  let rows=cData?.[rKey]||[];
  if(!rows.length){html+='<div class="empty"><div class="empty-icon">\u{1F3C6}</div><div class="empty-title">No predictions yet</div></div>';return html;}
  const activePrizes = isOverall ? comp.overallPrizes : round?.prizes;
  let rank=1;
  if(comp.mode==='score'||comp.mode==='betting'){
    rows.sort((a,b)=>b.points-a.points);
    rows.forEach((r,i)=>{if(i>0&&rows[i].points<rows[i-1].points)rank=i+1;r.rank=rank;});
    html+=buildLBTable(comp.name,isOverall?'Overall':round.label,rows,r=>`<td class="lb-num">${r.points} pts</td>`,'<th class="r" style="width:80px;">Points</th>',activePrizes);
  } else if(comp.mode==='ranking'){
    rows.sort((a,b)=>b.points-a.points);
    rows.forEach((r,i)=>{if(i>0&&rows[i].points<rows[i-1].points)rank=i+1;r.rank=rank;});
    html+=buildLBTable(comp.name,isOverall?'Overall':round.label,rows,r=>`<td class="lb-num">${r.points} pts</td>`,'<th class="r" style="width:80px;">Points</th>',activePrizes);
  } else {
    rows.sort((a,b)=>(b.correct||0)-(a.correct||0));
    rows.forEach((r,i)=>{if(i>0&&((rows[i].correct||0)<(rows[i-1].correct||0)))rank=i+1;r.rank=rank;});
    html+=buildLBTable(comp.name,isOverall?'Overall':round.label,rows,r=>`<td class="lb-num">${r.correct||0}</td>`,'<th class="r" style="width:80px;">Correct</th>',activePrizes);
  }
  return html;
}
function changeLBSelection(val){lbSelection[currentCompIdx]=val==='overall'?'overall':parseInt(val);renderPredict();}
function lbInitials(name){
  const parts=(name||'').replace(/[^a-z0-9_ ]/gi,'').split(/[_ ]/).filter(Boolean);
  return ((parts[0]?.[0]||'')+(parts[1]?.[0]||parts[0]?.[1]||'')).toUpperCase();
}
function ordinal(n){
  const s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
function buildLBTable(title,sub,rows,cellFn,colHeader,prizes,extraCellFn,extraColHeader){
  const me=currentUser;
  const prizeMap={};
  (prizes||[]).forEach(p=>{prizeMap[p.pos]=p.text;});
  const hasPrizes=Object.keys(prizeMap).length>0;
  const hasExtra=!!extraCellFn;
  const extraColHeaderMobile = extraColHeader ? extraColHeader.replace('<th ','<th class="lb-col-extra" ') : extraColHeader;
  const medalColor={1:'#e8b53a',2:'#b9c0cc',3:'#cd8a52'};
  const prizeIcon={1:'🏆',2:'🥈',3:'🥉'};
  const prizeBg={1:'#fbf1cf',2:'#eef0f4',3:'#f4e3d3'};
  let html=`<div class="lb-wrap"><table class="lb-table" style="table-layout:fixed;"><thead><tr><th style="width:32px;text-align:center">#</th><th style="width:auto;">Player</th>${colHeader}${hasExtra?extraColHeaderMobile:''}${hasPrizes?'<th style="width:56px;text-align:center;">Prize</th>':''}</tr></thead><tbody>`;
  rows.forEach(row=>{
    const isMe=row.u===me;
    const rankColor=row.rank<=3?medalColor[row.rank]:'var(--text-3)';
    const avatarBg=isMe?'linear-gradient(135deg,var(--accent),oklch(0.62 0.15 275))':'oklch(0.94 0.006 260)';
    const prizeText=prizeMap[row.rank];
    const icon=prizeIcon[row.rank]||'🏆';
    const bg=prizeBg[row.rank]||'oklch(0.95 0.02 275)';
    let prizeCell='';
    if(hasPrizes){
      if(prizeText){
        const safeText=prizeText.replace(/</g,'&lt;').replace(/"/g,'&quot;');
        prizeCell=`<td style="width:56px;"><div class="prize-cell-wrap"><div class="prize-badge" style="background:${bg};">${icon}<span class="prize-info-dot">i</span></div><div class="prize-tooltip"><div class="prize-tooltip-title">${ordinal(row.rank)} place prize</div><div class="prize-tooltip-desc">${safeText}</div><div class="prize-tooltip-arrow"></div></div></div></td>`;
      } else {
        prizeCell=`<td style="width:56px;" title="No prize for this position"><div style="display:flex;align-items:center;justify-content:center;"><span style="color:var(--text-3);">—</span></div></td>`;
      }
    }
    const extraCell = hasExtra ? extraCellFn(row).replace('<td ','<td class="lb-col-extra" ') : '';
    html+=`<tr class="${isMe?'me':''}"><td class="lb-rank" style="color:${rankColor};">${row.rank}</td><td><div style="display:flex;align-items:center;gap:8px;min-width:0;"><div style="width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${isMe?'#fff':'var(--text-2)'};background:${avatarBg};">${lbInitials(row.u)}</div><span class="lb-uname ${isMe?'me':''}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${row.u}</span>${isMe?'<span style="flex-shrink:0;margin-left:2px;font-size:9px;font-weight:800;color:var(--accent);background:var(--accent-light);padding:2px 6px;border-radius:5px;letter-spacing:0.3px;">YOU</span>':''}</div></td>${cellFn(row)}${extraCell}${prizeCell}</tr>`;
  });
  html+='</tbody></table></div>';return html;
}

// ── RULES POPUP ───────────────────────────────────────────────────────────
function showRules(mode){
  const rules={
    score:`<h3 style="margin-bottom:12px;">Score Predictor Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">
<div><strong style="color:var(--text);">How to play:</strong> Predict the exact final score for each match before the deadline.</div>
<div><strong style="color:var(--text);">Points:</strong></div>
<div style="padding-left:12px;">
• Exact score correct — <strong style="color:var(--green);">+5 pts</strong><br>
• Home team goals correct only — <strong>+2 pts</strong><br>
• Away team goals correct only — <strong>+2 pts</strong><br>
• Total goals correct only — <strong>+1 pt</strong>
</div>
<div><strong style="color:var(--text);">Leaderboard:</strong> Players are ranked by total points. Highest score wins.</div>
</div>`,
    lms:`<h3 style="margin-bottom:12px;">Last Man Standing Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">
<div><strong style="color:var(--text);">How to play:</strong> Predict the outcome (Home Win, Draw, or Away Win) for every event in the round.</div>
<div><strong style="color:var(--text);">Elimination:</strong> Events are resolved in kick-off order. If your prediction is wrong, you are eliminated at that event. All remaining events are irrelevant.</div>
<div><strong style="color:var(--text);">Winning:</strong> The last player(s) still standing after all events win the round.</div>
<div><strong style="color:var(--text);">Note:</strong> You must predict ALL events before the round starts. No two events can share the same kick-off time.</div>
</div>`,
    fantasy:`<h3 style="margin-bottom:12px;">CS2 Simple Fantasy Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">
<div><strong style="color:var(--text);">How to play:</strong> Pick 5 CS2 players from any of the 8 playoff teams within the $50,000 budget.</div>
<div><strong style="color:var(--text);">Scoring:</strong> Each kill by your player earns <strong style="color:var(--green);">+1 point</strong>. Total points = sum of all your players' kills across the tournament.</div>
<div><strong style="color:var(--text);">Budget:</strong> $50,000 total. Player prices range from $7,000 to $12,500 based on form and rating.</div>
<div><strong style="color:var(--text);">Winning:</strong> The manager with the highest total kills from their 5-player roster wins.</div>
</div>`,
    ranking:`<h3 style="margin-bottom:12px;">Ranking Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">
<div><strong style="color:var(--text);">How to play:</strong> Sort the selected teams from highest to lowest expected goals (xG) for the gameweek.</div>
<div><strong style="color:var(--text);">Points:</strong></div>
<div style="padding-left:12px;">
• Each team in the correct position — <strong style="color:var(--green);">+2 pts</strong><br>
• All teams in perfect order — <strong style="color:var(--green);">+5 bonus pts</strong>
</div>
<div><strong style="color:var(--text);">Tip:</strong> Think about which teams are playing at home, their recent form, and the quality of their opponents.</div>
</div>`,
    roulette:`<h3 style="margin-bottom:12px;">Soccer Roulette Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">
<div><strong style="color:var(--text);">How to play:</strong> You get 100 coins per match. Place them anywhere on the score grid, or on Both Teams to Score / Over-Under 2.5.</div>
<div><strong style="color:var(--text);">Bet types:</strong></div>
<div style="padding-left:12px;">
• Straight — one exact score — <strong style="color:var(--green);">×16</strong><br>
• Split — the dot between two adjacent scores, covers both — <strong style="color:var(--green);">×8</strong><br>
• Corner — the dot where four scores meet, covers all four — <strong style="color:var(--green);">×4</strong><br>
• BTTS / Over-Under 2.5 — <strong style="color:var(--green);">×2</strong>
</div>
<div><strong style="color:var(--text);">Payouts:</strong> Set purely by how many outcomes a bet covers — no bookmaker-style odds shading.</div>
</div>`,
    betting:`<h3 style="margin-bottom:12px;">Betting Markets Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">

</div>
<div><strong style="color:var(--text);">Points:</strong> Each market has its own points value, set by the competition operator. A wrong pick on a market earns <strong>0 pts</strong> for that market — the others aren't affected.</div>
</div>`,
    lineup:`<h3 style="margin-bottom:12px;">Lineup Predictor Rules</h3>
<div style="display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.6;color:var(--text-2);">

<div><strong style="color:var(--text);">Points:</strong></div>
<div style="padding-left:12px;">
• Each correct player in your lineup — <strong style="color:var(--green);">+10 pts</strong><br>
• All 11 players correct — <strong style="color:var(--green);">+30 bonus pts</strong>
</div>
<div><strong style="color:var(--text);">Leaderboard:</strong> Players are ranked by total points across all correctly predicted lineups.</div>
</div>`,
  };
  const content=rules[mode]||'';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML=`<div onclick="this.parentElement.remove()" style="position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(2px);"></div><div style="position:relative;background:var(--white);border-radius:14px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto;"><button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-3);">×</button>${content}</div>`;
  document.body.appendChild(overlay);
}

// ── PROFILE ───────────────────────────────────────────────────────────────
function renderProfile(){
  const totalPreds=Object.keys(preds).length;
  const hitCount=Object.entries(preds).reduce((acc,[eid,pred])=>{
    const ev=EVENTS[eid];if(!ev||!ev.res)return acc;
    if(typeof pred==='object'&&pred.h!==undefined){
      if(parseInt(pred.h)==ev.res.h&&parseInt(pred.a)==ev.res.a)return acc+1;
    } else if(typeof pred==='string'){
      const actual=ev.res.h>ev.res.a?'H':ev.res.h<ev.res.a?'A':'D';
      if(pred===actual)return acc+1;
    }
    return acc;
  },0);
  const resultedPreds=Object.entries(preds).filter(([eid])=>EVENTS[eid]?.res).length;
  const hitRate=resultedPreds>0?Math.round(hitCount/resultedPreds*100):0;

  // Fake competition data for demo
  const activeComps=[
    {name:'Score Predictor',mode:'score',points:18,rank:2,total:6},
    {name:'Betting Markets',mode:'betting',points:10,rank:3,total:5},
  ];
  const endedComps=[];

  document.getElementById('profile-content').innerHTML=`
    <div style="padding:10px 16px 0;"><button onclick="goTab('predict')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--accent);font-weight:700;font-family:var(--mono);">← Back to predictions</button></div>
    <div class="profile-header"><div class="profile-av">DE</div><div class="profile-name">demo_user</div><div class="profile-joined">Demo account</div></div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="ps-val">${totalPreds}</div><div class="ps-label">Total Predictions</div></div>
      <div class="profile-stat"><div class="ps-val">${hitRate}%</div><div class="ps-label">Hit Rate</div></div>
      <div class="profile-stat"><div class="ps-val">${COMPS.length}</div><div class="ps-label">Competitions</div></div>
    </div>
    <div class="profile-section">
      <div class="profile-section-title">Active Competitions</div>
      ${activeComps.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="width:4px;height:32px;border-radius:2px;background:${c.mode==='score'?'#4F46E5':c.mode==='lms'?'#DC2626':'#059669'};flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);">${c.name}</div>
          <div style="font-size:10px;color:var(--text-3);">${MODE_LABELS[c.mode]}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--mono);font-size:14px;font-weight:800;color:var(--text);">${c.points} pts</div>
          <div style="font-size:10px;color:var(--text-3);">#${c.rank} of ${c.total}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="profile-section">
      <div class="profile-section-title">Ended Competitions</div>
      ${endedComps.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);opacity:0.7;">
        <div style="width:4px;height:32px;border-radius:2px;background:${c.mode==='score'?'#4F46E5':c.mode==='lms'?'#DC2626':'#059669'};flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);">${c.name}</div>
          <div style="font-size:10px;color:var(--text-3);">${c.note||MODE_LABELS[c.mode]}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--mono);font-size:14px;font-weight:800;color:var(--text);">${c.points} pts</div>
          <div style="font-size:10px;color:var(--text-3);">#${c.rank} of ${c.total}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="profile-section" style="padding-top:8px;">
      <div style="font-size:11px;color:var(--text-3);background:var(--bg);padding:10px;border-radius:6px;">This is a demo. In the live embed, users register with their own email and password.</div>
    </div>`;
}

renderCompTabs();goTab('predict');
