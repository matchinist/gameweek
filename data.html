<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameweek — Data Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F8FA;--white:#FFFFFF;--border:#E2E4EA;
  --text:#0F1117;--text-2:#6B7280;--text-3:#9CA3AF;
  --accent:#4F46E5;--accent-2:#3730A3;--accent-light:#EEF2FF;
  --green:#16A34A;--green-light:#DCFCE7;
  --red:#DC2626;--red-light:#FEE2E2;
  --amber:#D97706;--amber-light:#FEF3C7;
  --sidebar:#0F1117;--sidebar-border:#262730;
  --mono:'Space Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── TOP NAV ── */
.topnav{background:var(--sidebar);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
.topnav-logo{font-family:var(--mono);font-size:14px;font-weight:700;color:white;letter-spacing:-0.5px;}
.topnav-logo span{color:var(--accent);}
.topnav-title{font-family:var(--mono);font-size:11px;color:#4B5563;letter-spacing:0.5px;}
.topnav-right{display:flex;align-items:center;gap:8px;}
.topnav-link{font-size:12px;color:#6B7280;text-decoration:none;padding:5px 10px;border-radius:5px;transition:color 0.13s;}
.topnav-link:hover{color:white;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 52px);}

/* ── LEFT PANEL ── */
.left-panel{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.left-panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.left-panel-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);}
.tournament-list{flex:1;overflow-y:auto;padding:8px;}
.tournament-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:6px;cursor:pointer;transition:all 0.13s;margin-bottom:2px;}
.tournament-item:hover{background:var(--bg);}
.tournament-item.active{background:var(--accent-light);}
.tournament-item.active .t-name{color:var(--accent);}
.t-badge{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;color:white;flex-shrink:0;background:var(--accent);}
.t-name{font-size:12px;font-weight:600;color:var(--text);flex:1;}
.t-count{font-family:var(--mono);font-size:10px;color:var(--text-3);}
.t-actions{display:none;gap:3px;}
.tournament-item:hover .t-actions{display:flex;}
.t-action-btn{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:13px;padding:2px 4px;border-radius:3px;}
.t-action-btn:hover{background:var(--border);color:var(--text);}
.t-action-btn.del:hover{background:var(--red-light);color:var(--red);}

/* ── RIGHT PANEL ── */
.right-panel{display:flex;flex-direction:column;overflow:hidden;}
.right-panel-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rph-left{display:flex;align-items:center;gap:10px;}
.rph-title{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);}
.rph-meta{font-size:12px;color:var(--text-3);}
.right-panel-body{flex:1;overflow-y:auto;padding:20px 24px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.13s;text-decoration:none;font-family:var(--sans);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-2);}
.btn-outline{background:var(--white);color:var(--text-2);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:none;color:var(--text-2);border:none;}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-success{background:var(--green-light);color:var(--green);border:1px solid #BBF7D0;}
.btn-success:hover{background:#BBF7D0;}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FECACA;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.3px;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-amber{background:var(--amber-light);color:var(--amber);}
.badge-gray{background:#F3F4F6;color:#6B7280;}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-blue{background:var(--accent-light);color:var(--accent);}

/* ── QUICK ADD FORM ── */
.quick-add{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px;}
.quick-add-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.quick-add-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;}
.quick-add-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;font-weight:600;color:var(--text-2);letter-spacing:0.3px;}
.form-input,.form-select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:12px;color:var(--text);background:var(--white);outline:none;transition:border-color 0.13s;width:100%;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text-3);}

/* ── EVENT CARDS ── */
.events-section-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.event-cards{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}

.event-card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.13s;}
.event-card:hover{border-color:#C4C8D8;}
.event-card.completed{border-left:3px solid var(--green);}
.event-card.upcoming{border-left:3px solid var(--border);}
.event-card.live{border-left:3px solid var(--red);}
.event-card.postponed{border-left:3px solid var(--amber);}

.event-card-main{display:flex;align-items:center;gap:12px;padding:12px 14px;}

.event-teams{flex:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.ev-team{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);}
.ev-team.away{text-align:right;}
.ev-vs{font-family:var(--mono);font-size:10px;color:var(--text-3);text-align:center;}

.event-time{font-family:var(--mono);font-size:10px;color:var(--text-3);white-space:nowrap;min-width:110px;}
.event-status-col{min-width:90px;display:flex;justify-content:center;}
.event-actions{display:flex;gap:4px;align-items:center;}

/* ── RESULT INPUT AREA ── */
.result-area{background:var(--bg);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:12px;}
.result-area.hidden{display:none;}
.score-input-group{display:flex;align-items:center;gap:8px;}
.score-team{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text-2);min-width:70px;}
.score-team.right{text-align:right;min-width:70px;}
.score-input{width:44px;height:34px;border:1px solid var(--border);border-radius:6px;text-align:center;font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);outline:none;-moz-appearance:textfield;}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-input:focus{border-color:var(--accent);}
.score-sep{font-family:var(--mono);font-size:14px;color:var(--text-3);font-weight:700;}
.result-confirmed{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);}
.result-confirmed .sep{color:var(--text-3);}

/* ── STATUS SELECT ── */
.status-select{font-family:var(--mono);font-size:10px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:var(--white);outline:none;cursor:pointer;color:var(--text-2);}
.status-select:focus{border-color:var(--accent);}

/* ── EMPTY STATES ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-3);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--text-3);line-height:1.6;}
.no-tournament{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:var(--text-3);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:10px;width:460px;max-width:calc(100vw - 32px);box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow:hidden;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--bg);}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-mb{margin-bottom:14px;}
.color-swatches{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.swatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all 0.13s;}
.swatch.selected,.swatch:hover{border-color:var(--text);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:6px;z-index:999;transform:translateY(80px);transition:transform 0.25s ease;pointer-events:none;}
#toast.show{transform:translateY(0);}

/* ── DIVIDER ── */
hr{border:none;border-top:1px solid var(--border);margin:4px 0;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="topnav-logo">game<span>week</span></div>
    <div class="topnav-title">DATA MANAGER</div>
  </div>
  <div class="topnav-right">
    <a href="gameweek-admin.html" class="topnav-link">← Admin Panel</a>
    <a href="https://matchinist.github.io/gameweek" target="_blank" class="topnav-link">View Demo ↗</a>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: TOURNAMENT LIST -->
  <div class="left-panel">
    <div class="left-panel-header">
      <div class="left-panel-title">Tournaments</div>
      <button class="btn btn-primary btn-sm" onclick="openModal('modal-create-tournament')">+ New</button>
    </div>
    <div class="tournament-list" id="tournament-list"></div>
  </div>

  <!-- RIGHT: EVENTS -->
  <div class="right-panel">
    <div class="right-panel-header" id="right-header">
      <div class="no-tournament" style="display:flex;flex-direction:row;align-items:center;gap:8px;padding:0;">
        <span style="font-size:12px;color:var(--text-3);">Select a tournament to manage events</span>
      </div>
    </div>
    <div class="right-panel-body" id="right-body">
      <div class="no-tournament">
        <div class="empty-icon">🏆</div>
        <div class="empty-title">No tournament selected</div>
        <div class="empty-sub">Choose a tournament from the left panel,<br>or create a new one to get started.</div>
      </div>
    </div>
  </div>

</div>

<!-- ── MODALS ── -->

<!-- Create Tournament -->
<div class="modal-overlay" id="modal-create-tournament">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Tournament</div>
      <button class="modal-close" onclick="closeModal('modal-create-tournament')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-mb">
        <label class="form-label" style="display:block;margin-bottom:4px;">Tournament Name</label>
        <input class="form-input" id="nt-name" placeholder="e.g. Premier League" />
      </div>
      <div class="form-row-2 form-mb">
        <div>
          <label class="form-label" style="display:block;margin-bottom:4px;">Country / Region</label>
          <input class="form-input" id="nt-country" placeholder="e.g. England" />
        </div>
        <div>
          <label class="form-label" style="display:block;margin-bottom:4px;">Season</label>
          <input class="form-input" id="nt-season" placeholder="e.g. 2025/26" />
        </div>
      </div>
      <div class="form-mb">
        <label class="form-label" style="display:block;margin-bottom:6px;">Badge Colour</label>
        <input type="color" style="width:36px;height:36px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;" id="nt-color" value="#4F46E5">
        <div class="color-swatches" id="color-swatches"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-create-tournament')">Cancel</button>
      <button class="btn btn-primary" onclick="createTournament()">Create Tournament</button>
    </div>
  </div>
</div>

<!-- Edit Tournament -->
<div class="modal-overlay" id="modal-edit-tournament">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Tournament</div>
      <button class="modal-close" onclick="closeModal('modal-edit-tournament')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-mb">
        <label class="form-label" style="display:block;margin-bottom:4px;">Tournament Name</label>
        <input class="form-input" id="et-name" />
      </div>
      <div class="form-row-2 form-mb">
        <div>
          <label class="form-label" style="display:block;margin-bottom:4px;">Country / Region</label>
          <input class="form-input" id="et-country" />
        </div>
        <div>
          <label class="form-label" style="display:block;margin-bottom:4px;">Season</label>
          <input class="form-input" id="et-season" />
        </div>
      </div>
      <div class="form-mb">
        <label class="form-label" style="display:block;margin-bottom:6px;">Badge Colour</label>
        <input type="color" style="width:36px;height:36px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;" id="et-color">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-tournament')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTournamentEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────
const S = {
  activeTournamentId: null,
  editingTournamentId: null,
  expandedEvents: new Set(),
  tournaments: [
    { id:'t1', name:'Premier League', country:'England', season:'2025/26', color:'#3D0D73' },
    { id:'t2', name:'UEFA Champions League', country:'Europe', season:'2025/26', color:'#1D4ED8' },
    { id:'t3', name:'La Liga', country:'Spain', season:'2025/26', color:'#DC2626' },
    { id:'t4', name:'Bundesliga', country:'Germany', season:'2025/26', color:'#D97706' },
    { id:'t5', name:'Serie A', country:'Italy', season:'2025/26', color:'#059669' },
    { id:'t6', name:'Ligue 1', country:'France', season:'2025/26', color:'#7C3AED' },
  ],
  events: [
    { id:'e101', tid:'t1', home:'Arsenal',    away:'Wolves',      kickoff:'2025-08-16T15:00', status:'completed', result:{h:3,a:0}, ou_line:2.5 },
    { id:'e102', tid:'t1', home:'Man City',   away:'Chelsea',     kickoff:'2025-08-16T17:30', status:'completed', result:{h:2,a:1}, ou_line:2.5 },
    { id:'e103', tid:'t1', home:'Liverpool',  away:'Brentford',   kickoff:'2025-08-17T14:00', status:'completed', result:{h:1,a:1}, ou_line:2.5 },
    { id:'e104', tid:'t1', home:'Arsenal',    away:'Brighton',    kickoff:'2025-08-23T15:00', status:'completed', result:{h:2,a:2}, ou_line:2.5 },
    { id:'e105', tid:'t1', home:'Man Utd',    away:'Liverpool',   kickoff:'2025-08-23T17:30', status:'completed', result:{h:0,a:3}, ou_line:2.5 },
    { id:'e106', tid:'t1', home:'Spurs',      away:'Everton',     kickoff:'2025-08-24T14:00', status:'completed', result:{h:1,a:0}, ou_line:2.5 },
    { id:'e107', tid:'t1', home:'Arsenal',    away:'Man City',    kickoff:'2025-08-30T15:00', status:'upcoming',  result:null,      ou_line:2.5 },
    { id:'e108', tid:'t1', home:'Liverpool',  away:'Man Utd',     kickoff:'2025-08-30T17:30', status:'upcoming',  result:null,      ou_line:2.5 },
    { id:'e109', tid:'t1', home:'Chelsea',    away:'Spurs',       kickoff:'2025-08-31T14:00', status:'upcoming',  result:null,      ou_line:2.5 },
    { id:'e201', tid:'t2', home:'Real Madrid',away:'Stuttgart',   kickoff:'2025-09-17T21:00', status:'completed', result:{h:3,a:1}, ou_line:2.5 },
    { id:'e202', tid:'t2', home:'Bayern',     away:'GNK Dinamo',  kickoff:'2025-09-17T21:00', status:'completed', result:{h:9,a:2}, ou_line:2.5 },
    { id:'e203', tid:'t2', home:'Man City',   away:'Inter',       kickoff:'2025-09-18T21:00', status:'completed', result:{h:0,a:0}, ou_line:2.5 },
    { id:'e204', tid:'t2', home:'PSG',        away:'Arsenal',     kickoff:'2025-10-01T21:00', status:'upcoming',  result:null,      ou_line:2.5 },
    { id:'e301', tid:'t3', home:'Real Madrid',away:'Valladolid',  kickoff:'2025-08-25T21:00', status:'completed', result:{h:3,a:0}, ou_line:2.5 },
    { id:'e302', tid:'t3', home:'Barcelona',  away:'Rayo',        kickoff:'2025-08-25T19:00', status:'completed', result:{h:2,a:1}, ou_line:2.5 },
    { id:'e303', tid:'t3', home:'Atletico',   away:'Sevilla',     kickoff:'2025-08-30T18:30', status:'upcoming',  result:null,      ou_line:2.5 },
  ]
};

const SWATCHES = ['#4F46E5','#DC2626','#D97706','#16A34A','#0891B2','#7C3AED','#DB2777','#3D0D73','#1D4ED8','#059669','#0F1117','#64748B'];

// ── HELPERS ──────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function getTournament(id){ return S.tournaments.find(t=>t.id===id); }
function getTournamentEvents(id){ return S.events.filter(e=>e.tid===id); }

function fmtDt(dt){
  if(!dt) return '—';
  try {
    const d = new Date(dt);
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } catch(e){ return dt; }
}

function abbr(name){
  return name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
}

function statusBadge(s){
  const map = {
    completed:`<span class="badge badge-green">✓ Final</span>`,
    upcoming:`<span class="badge badge-gray">Upcoming</span>`,
    live:`<span class="badge badge-red">● Live</span>`,
    postponed:`<span class="badge badge-amber">Postponed</span>`,
  };
  return map[s]||`<span class="badge badge-gray">${s}</span>`;
}

function groupByDate(events){
  const groups = {};
  events.forEach(ev=>{
    const d = ev.kickoff ? ev.kickoff.split('T')[0] : 'no-date';
    if(!groups[d]) groups[d]=[];
    groups[d].push(ev);
  });
  return groups;
}

function fmtDateLabel(dateStr){
  if(dateStr==='no-date') return 'No date set';
  try{
    const d = new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }catch(e){return dateStr;}
}

// ── RENDER TOURNAMENT LIST ────────────────────────────────────────────────
function renderTournamentList(){
  const el = document.getElementById('tournament-list');
  if(S.tournaments.length===0){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-3);font-size:12px;">No tournaments yet.<br>Create one to get started.</div>';
    return;
  }
  el.innerHTML = S.tournaments.map(t=>{
    const count = getTournamentEvents(t.id).length;
    const isActive = t.id === S.activeTournamentId;
    return `<div class="tournament-item${isActive?' active':''}" onclick="selectTournament('${t.id}')">
      <div class="t-badge" style="background:${t.color}">${abbr(t.name)}</div>
      <div style="flex:1;min-width:0;">
        <div class="t-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}</div>
        <div style="font-size:10px;color:var(--text-3);">${t.country} · ${t.season}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <span class="t-count">${count}</span>
        <div class="t-actions">
          <button class="t-action-btn" title="Edit" onclick="event.stopPropagation();editTournament('${t.id}')">✎</button>
          <button class="t-action-btn del" title="Delete" onclick="event.stopPropagation();deleteTournament('${t.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── SELECT TOURNAMENT ─────────────────────────────────────────────────────
function selectTournament(id){
  S.activeTournamentId = id;
  renderTournamentList();
  renderRightPanel();
}

// ── RENDER RIGHT PANEL ────────────────────────────────────────────────────
function renderRightPanel(){
  const t = getTournament(S.activeTournamentId);
  if(!t){ return; }

  const events = getTournamentEvents(t.id);
  const completed = events.filter(e=>e.status==='completed').length;
  const upcoming = events.filter(e=>e.status==='upcoming').length;
  const live = events.filter(e=>e.status==='live').length;

  // Header
  document.getElementById('right-header').innerHTML = `
    <div class="rph-left">
      <div class="t-badge" style="background:${t.color};width:36px;height:36px;border-radius:8px;font-size:10px;">${abbr(t.name)}</div>
      <div>
        <div class="rph-title">${t.name}</div>
        <div class="rph-meta">${t.country} · ${t.season} · ${events.length} events · ${completed} final · ${upcoming} upcoming${live>0?` · ${live} live`:''}</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-outline btn-sm" onclick="editTournament('${t.id}')">Edit</button>
    </div>`;

  // Body
  const groups = groupByDate(events);
  const sortedDates = Object.keys(groups).sort();

  let html = '';

  // Quick add form
  html += `<div class="quick-add">
    <div class="quick-add-title">Add Event</div>
    <div class="quick-add-row">
      <div class="form-group">
        <label class="form-label">Home Team</label>
        <input class="form-input" id="qa-home" placeholder="e.g. Arsenal" />
      </div>
      <div class="form-group">
        <label class="form-label">Away Team</label>
        <input class="form-input" id="qa-away" placeholder="e.g. Man City" />
      </div>
      <div class="form-group">
        <label class="form-label">Kick-off</label>
        <input class="form-input" type="datetime-local" id="qa-kickoff" />
      </div>
      <div class="form-group">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" onclick="quickAddEvent('${t.id}')">Add →</button>
      </div>
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;">
      <div class="form-group" style="flex:1;">
        <label class="form-label">O/U Line (default for all new events)</label>
        <input class="form-input" type="number" step="0.5" id="qa-line" value="2.5" style="max-width:100px;" />
      </div>
      <div style="font-size:11px;color:var(--text-3);">Used in Over/Under competitions. Can be edited per event.</div>
    </div>
  </div>`;

  if(events.length === 0){
    html += `<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">No events yet</div>
      <div class="empty-sub">Use the form above to add the first match.</div>
    </div>`;
  } else {
    sortedDates.forEach(date=>{
      html += `<div class="events-section-title">${fmtDateLabel(date)}</div>`;
      html += `<div class="event-cards">`;
      groups[date].sort((a,b)=>a.kickoff.localeCompare(b.kickoff)).forEach(ev=>{
        html += renderEventCard(ev);
      });
      html += `</div>`;
    });
  }

  document.getElementById('right-body').innerHTML = html;
}

// ── RENDER EVENT CARD ─────────────────────────────────────────────────────
function renderEventCard(ev){
  const isExpanded = S.expandedEvents.has(ev.id);
  const hasResult = ev.result !== null;

  let resultDisplay = '';
  if(hasResult){
    resultDisplay = `<div class="result-confirmed">
      <span>${ev.result.h}</span>
      <span class="sep">–</span>
      <span>${ev.result.a}</span>
    </div>`;
  }

  let expandedArea = '';
  if(isExpanded){
    expandedArea = `<div class="result-area" id="ra-${ev.id}">
      <div style="font-size:11px;font-weight:600;color:var(--text-2);min-width:80px;">Result</div>
      <div class="score-input-group" style="display:flex;align-items:center;gap:8px;flex:1;">
        <span class="score-team">${ev.home}</span>
        <input class="score-input" type="number" min="0" max="30" id="sh-${ev.id}" placeholder="0" value="${hasResult?ev.result.h:''}" />
        <span class="score-sep">–</span>
        <input class="score-input" type="number" min="0" max="30" id="sa-${ev.id}" placeholder="0" value="${hasResult?ev.result.a:''}" />
        <span class="score-team right">${ev.away}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:8px;">
        <div style="display:flex;flex-direction:column;gap:3px;">
          <label style="font-size:9px;font-weight:600;color:var(--text-3);">O/U LINE</label>
          <input class="form-input" type="number" step="0.5" value="${ev.ou_line||2.5}" id="line-${ev.id}" style="width:62px;padding:5px 8px;font-family:var(--mono);font-size:12px;font-weight:700;" />
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <label style="font-size:9px;font-weight:600;color:var(--text-3);">KICK-OFF</label>
          <input class="form-input" type="datetime-local" value="${ev.kickoff||''}" id="ko-${ev.id}" style="font-size:11px;padding:5px 8px;" />
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <label style="font-size:9px;font-weight:600;color:var(--text-3);">STATUS</label>
          <select class="status-select" id="st-${ev.id}">
            <option value="upcoming" ${ev.status==='upcoming'?'selected':''}>Upcoming</option>
            <option value="live" ${ev.status==='live'?'selected':''}>Live</option>
            <option value="completed" ${ev.status==='completed'?'selected':''}>Completed</option>
            <option value="postponed" ${ev.status==='postponed'?'selected':''}>Postponed</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-left:8px;">
        <button class="btn btn-success btn-sm" onclick="saveEventData('${ev.id}')">Save</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleExpand('${ev.id}')">Cancel</button>
      </div>
    </div>`;
  }

  return `<div class="event-card ${ev.status}" id="card-${ev.id}">
    <div class="event-card-main">
      <div class="event-teams">
        <span class="ev-team">${ev.home}</span>
        <span class="ev-vs">${hasResult?`${ev.result.h}–${ev.result.a}`:'vs'}</span>
        <span class="ev-team away">${ev.away}</span>
      </div>
      <div class="event-time">${fmtDt(ev.kickoff)}</div>
      <div class="event-status-col">${statusBadge(ev.status)}</div>
      <div class="event-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleExpand('${ev.id}')" style="font-family:var(--mono);font-size:10px;">
          ${isExpanded ? 'Close' : (hasResult ? 'Edit ✎' : 'Enter data →')}
        </button>
        <button class="btn btn-ghost btn-sm" onclick="deleteEvent('${ev.id}')" style="color:var(--red);padding:5px 7px;" title="Delete">✕</button>
      </div>
    </div>
    ${expandedArea}
  </div>`;
}

// ── TOGGLE EXPAND ─────────────────────────────────────────────────────────
function toggleExpand(id){
  if(S.expandedEvents.has(id)) S.expandedEvents.delete(id);
  else S.expandedEvents.add(id);
  renderRightPanel();
  // scroll to card
  setTimeout(()=>{
    const el = document.getElementById('card-'+id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 50);
}

// ── SAVE EVENT DATA ───────────────────────────────────────────────────────
function saveEventData(id){
  const ev = S.events.find(e=>e.id===id);
  if(!ev) return;

  const h = document.getElementById('sh-'+id).value;
  const a = document.getElementById('sa-'+id).value;
  const line = document.getElementById('line-'+id).value;
  const ko = document.getElementById('ko-'+id).value;
  const st = document.getElementById('st-'+id).value;

  if(h!==''&&a!==''){
    ev.result = { h:parseInt(h), a:parseInt(a) };
  }
  if(line) ev.ou_line = parseFloat(line);
  if(ko) ev.kickoff = ko;
  ev.status = st;

  // Auto-set status to completed if result entered
  if(h!==''&&a!==''&&st==='upcoming') ev.status='completed';

  S.expandedEvents.delete(id);
  renderRightPanel();
  toast(`Saved: ${ev.home} ${ev.result?ev.result.h+'–'+ev.result.a:''} ${ev.away}`);
}

// ── QUICK ADD EVENT ───────────────────────────────────────────────────────
function quickAddEvent(tid){
  const home = document.getElementById('qa-home').value.trim();
  const away = document.getElementById('qa-away').value.trim();
  const kickoff = document.getElementById('qa-kickoff').value;
  const line = parseFloat(document.getElementById('qa-line').value)||2.5;

  if(!home||!away){ toast('Enter both team names'); return; }

  const ev = { id:'e'+uid(), tid, home, away, kickoff, status:'upcoming', result:null, ou_line:line };
  S.events.push(ev);

  document.getElementById('qa-home').value='';
  document.getElementById('qa-away').value='';

  renderRightPanel();
  toast(`Added: ${home} vs ${away}`);
}

// ── DELETE EVENT ──────────────────────────────────────────────────────────
function deleteEvent(id){
  const ev = S.events.find(e=>e.id===id);
  if(!confirm(`Remove ${ev.home} vs ${ev.away}?`)) return;
  S.events = S.events.filter(e=>e.id!==id);
  S.expandedEvents.delete(id);
  renderRightPanel();
  toast('Event removed');
}

// ── CREATE TOURNAMENT ─────────────────────────────────────────────────────
function createTournament(){
  const name = document.getElementById('nt-name').value.trim();
  if(!name){ toast('Enter tournament name'); return; }
  const t = {
    id:'t'+uid(),
    name,
    country: document.getElementById('nt-country').value.trim()||'—',
    season: document.getElementById('nt-season').value.trim()||'2025/26',
    color: document.getElementById('nt-color').value
  };
  S.tournaments.push(t);
  closeModal('modal-create-tournament');
  document.getElementById('nt-name').value='';
  document.getElementById('nt-country').value='';
  renderTournamentList();
  selectTournament(t.id);
  toast('Tournament created');
}

// ── EDIT TOURNAMENT ───────────────────────────────────────────────────────
function editTournament(id){
  const t = getTournament(id);
  S.editingTournamentId = id;
  document.getElementById('et-name').value = t.name;
  document.getElementById('et-country').value = t.country;
  document.getElementById('et-season').value = t.season;
  document.getElementById('et-color').value = t.color;
  openModal('modal-edit-tournament');
}

function saveTournamentEdit(){
  const t = getTournament(S.editingTournamentId);
  t.name    = document.getElementById('et-name').value.trim()||t.name;
  t.country = document.getElementById('et-country').value.trim();
  t.season  = document.getElementById('et-season').value.trim();
  t.color   = document.getElementById('et-color').value;
  closeModal('modal-edit-tournament');
  renderTournamentList();
  if(S.activeTournamentId===S.editingTournamentId) renderRightPanel();
  toast('Tournament updated');
}

// ── DELETE TOURNAMENT ─────────────────────────────────────────────────────
function deleteTournament(id){
  const t = getTournament(id);
  const count = getTournamentEvents(id).length;
  const msg = count>0
    ? `Delete "${t.name}" and its ${count} events? This cannot be undone.`
    : `Delete "${t.name}"?`;
  if(!confirm(msg)) return;
  S.tournaments = S.tournaments.filter(t=>t.id!==id);
  S.events = S.events.filter(e=>e.tid!==id);
  if(S.activeTournamentId===id){
    S.activeTournamentId=null;
    document.getElementById('right-header').innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:0;"><span style="font-size:12px;color:var(--text-3);">Select a tournament to manage events</span></div>`;
    document.getElementById('right-body').innerHTML=`<div class="no-tournament"><div class="empty-icon">🏆</div><div class="empty-title">No tournament selected</div><div class="empty-sub">Choose a tournament from the left panel,<br>or create a new one to get started.</div></div>`;
  }
  renderTournamentList();
  toast('Tournament deleted');
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────
function openModal(id){
  document.getElementById(id).classList.add('open');
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ── COLOR SWATCHES ────────────────────────────────────────────────────────
function buildSwatches(){
  const el = document.getElementById('color-swatches');
  if(!el) return;
  el.innerHTML = SWATCHES.map(c=>`
    <div class="swatch" style="background:${c};" onclick="document.getElementById('nt-color').value='${c}'" title="${c}"></div>
  `).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildSwatches();
renderTournamentList();
</script>
</body>
</html>
