<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Gameweek DB Test</title>
<style>body{font-family:monospace;padding:20px;background:#0f1117;color:#e5e7eb;}h2{color:#818cf8;}pre{background:#1a1d27;padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;}.ok{color:#22c55e;}.err{color:#ef4444;}.info{color:#94a3b8;}</style>
</head>
<body>
<h2>Gameweek — Supabase Connectivity Test</h2>
<p class="info">Testing connection and data for client: <strong id="client-key">reading URL…</strong></p>
<div id="results"></div>

<script>
const SUPA_URL = 'https://mgfzqkesikfdrahherfm.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nZnpxa2VzaWtmZHJhaGhlcmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjA5ODAsImV4cCI6MjA5NTAzNjk4MH0.uzhqaPtsEE-dthbpv1tl6krZj7FidfTblV_7ilcAxFI';
const CLIENT = new URLSearchParams(location.search).get('client') || 'gw_cat_i24mfu';
document.getElementById('client-key').textContent = CLIENT;

const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };

async function test(label, url) {
  const div = document.createElement('div');
  div.innerHTML = `<p class="info">⏳ ${label}…</p>`;
  document.getElementById('results').appendChild(div);
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/' + url, { headers: H });
    const data = await res.json();
    div.innerHTML = `<p class="ok">✓ ${label}: ${Array.isArray(data) ? data.length + ' rows' : 'ok'}</p><pre>${JSON.stringify(data, null, 2).slice(0, 800)}</pre>`;
  } catch(e) {
    div.innerHTML = `<p class="err">✗ ${label}: ${e.message}</p>`;
  }
}

(async () => {
  await test('gw_dm_teams (global)',          'gw_dm_teams');
  await test('gw_dm_events (global)',         'gw_dm_events');
  await test('gw_competitions (this client)', `gw_competitions?client_key=eq.${CLIENT}`);
  await test('gw_rounds (this client)',       `gw_rounds?client_key=eq.${CLIENT}`);
})();
</script>
</body>
</html>
